<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending - CineStream</title>
    <style>
        :root {
            --bg:#0a0a0a; --bg2:#111; --glass:rgba(20,20,20,0.75); --border:rgba(255,255,255,0.06);
            --text:#e0e0e0; --accent:#8b5cf6; --radius:14px; --transition:0.3s;
        }
        *{box-sizing:border-box; margin:0; padding:0;}
        body{background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif;}
        .header{position:sticky; top:0; background:rgba(10,10,10,0.9); backdrop-filter:blur(20px); padding:12px 5%; display:flex; align-items:center; border-bottom:1px solid var(--border);}
        .logo{font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,#fff,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto;}
        .tabs{display:flex; gap:10px; padding:16px 5%;}
        .tab-btn{background:var(--glass); border:1px solid var(--border); color:#fff; padding:8px 18px; border-radius:20px; cursor:pointer;}
        .tab-btn.active{background:var(--accent);}
        .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:16px; padding:0 5% 30px;}
        .rank-card{position:relative; border-radius:var(--radius); overflow:hidden; background:var(--bg2); transition:var(--transition); cursor:pointer; border:1px solid transparent;}
        .rank-card:hover{transform:translateY(-6px); border-color:var(--accent);}
        .rank-card img{width:100%; aspect-ratio:2/3; object-fit:cover;}
        .rank-number{position:absolute; top:6px; left:6px; background:var(--accent); color:#fff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem; z-index:2;}
        .card-info{padding:10px;}
        .card-info .title{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
        .card-info .meta{font-size:0.8rem; color:#aaa;}
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">CineStream</a>
        <span style="font-size:1.2rem;">🔥 Trending</span>
    </header>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('day')">Today</button>
        <button class="tab-btn" onclick="switchTab('week')">This Week</button>
    </div>
    <div class="grid" id="trendingGrid"></div>

    <script>
        (function() {
            const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
            const TMDB_BASE = "https://api.themoviedb.org/3";
            const IMG = "https://image.tmdb.org/t/p/w342";
            let currentTab = 'day';

            async function fetchTMDB(endpoint, params) {
                const url = new URL(`${TMDB_BASE}${endpoint}`);
                url.searchParams.set('api_key', TMDB_API_KEY);
                Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
                const res = await fetch(url);
                return res.ok ? res.json() : null;
            }

            async function loadTrending(timeWindow) {
                const grid = document.getElementById('trendingGrid');
                grid.innerHTML = '<div class="skeleton" style="height:200px; grid-column:1/-1;"></div>';
                const [movies, tv] = await Promise.all([
                    fetchTMDB(`/trending/movie/${timeWindow}`),
                    fetchTMDB(`/trending/tv/${timeWindow}`)
                ]);
                const all = [...(movies?.results||[]).map(r=>({...r, media_type:'movie'})), 
                             ...(tv?.results||[]).map(r=>({...r, media_type:'tv'}))];
                all.sort((a,b)=> (b.vote_average||0)-(a.vote_average||0));
                grid.innerHTML = all.slice(0,30).map((item, i)=>{
                    const title = item.title || item.name;
                    const year = (item.release_date||item.first_air_date||'').slice(0,4);
                    return `
                    <div class="rank-card" onclick="window.location='movie.html?id=${item.id}&type=${item.media_type}'">
                        <span class="rank-number">${i+1}</span>
                        <img src="${IMG}${item.poster_path}" alt="${title}" onerror="this.src='data:image/svg+xml,...'">
                        <div class="card-info">
                            <div class="title">${title}</div>
                            <div class="meta">⭐ ${item.vote_average?.toFixed(1)} | ${year}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            window.switchTab = function(tab) {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                document.querySelector(`.tab-btn:${tab==='day'?'first-child':'last-child'}`).classList.add('active');
                loadTrending(tab);
            };

            loadTrending('day');
        })();
    </script>
</body>
</html>
