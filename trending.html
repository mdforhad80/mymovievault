<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending - StreamVault</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header class="site-header glass">
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <a href="index.html" class="logo">STREAMVAULT</a>
    <div class="header-actions">
      <button class="search-toggle" aria-label="Search">🔍</button>
    </div>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="trending.html">Trending</a>
    </nav>
  </header>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search movies, TV shows..." autocomplete="off">
      <button class="search-close" id="searchClose">✕</button>
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
  </div>

  <main>
    <section class="page-header">
      <h1>Trending Today</h1>
    </section>
    <div class="content-grid" id="trendingGrid"></div>
  </main>

  <footer class="site-footer">
    <p>StreamVault - Cinematic Streaming Experience</p>
  </footer>

  <script type="module">
    import { fetchTrending } from './assets/js/tmdb.js';
    import { createCard } from './assets/js/ui.js';
    import { initSearch, initHeader } from './assets/js/app.js';

    initHeader();
    initSearch();

    const grid = document.getElementById('trendingGrid');
    async function load() {
      const data = await fetchTrending();
      data.results.forEach(item => {
        if (item.media_type === 'movie' || item.media_type === 'tv') {
          grid.appendChild(createCard(item, item.media_type));
        }
      });
    }
    load();
  </script>
</body>
</html>
