<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - StreamVault</title>
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a; --accent: #7c3aed; --accent2: #a855f7;
            --text: #f1f1f1; --text2: #b0b0b0; --gold: #f59e0b; --radius: 12px;
            --transition: 0.3s ease; --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font); }
        .header { position:fixed; top:0; left:0; right:0; z-index:100; height:64px; background:rgba(10,10,10,0.9); backdrop-filter:blur(20px); display:flex; align-items:center; padding:0 20px; gap:16px; }
        .logo { flex:1; font-weight:800; font-size:1.4rem; color:#fff; text-decoration:none; }
        .btn { padding:10px 22px; border-radius:30px; font-weight:600; border:none; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .hero-detail { position:relative; width:100%; height:60vh; min-height:400px; overflow:hidden; }
        .hero-detail .backdrop { position:absolute; inset:0; background-size:cover; background-position:center; }
        .hero-detail .overlay { position:absolute; inset:0; background:linear-gradient(to top, var(--bg) 10%, transparent 70%); }
        .detail-content { position:relative; z-index:2; max-width:1200px; margin:-120px auto 0; padding:0 20px; display:flex; gap:30px; flex-wrap:wrap; }
        .poster { width:280px; border-radius:var(--radius); box-shadow:0 10px 30px rgba(0,0,0,0.6); flex-shrink:0; }
        .info { flex:1; min-width:280px; }
        .cast-scroller { display:flex; gap:12px; overflow-x:auto; padding:10px 0; }
        .cast-card { flex:0 0 auto; width:120px; text-align:center; }
        .cast-card img { width:100%; border-radius:50%; aspect-ratio:1; object-fit:cover; }
        .similar-scroller { display:flex; gap:14px; overflow-x:auto; }
        .similar-card { flex:0 0 auto; width:150px; border-radius:var(--radius); overflow:hidden; background:var(--surface); cursor:pointer; text-decoration:none; color:inherit; }
        .similar-card img { width:100%; aspect-ratio:2/3; object-fit:cover; }
        @media (max-width:768px) { .detail-content { flex-direction:column; margin-top:-80px; } .poster { width:180px; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">◀ StreamVault</a>
    </header>
    <div class="hero-detail" id="heroDetail"></div>
    <div class="detail-content" id="detailContent"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type'); // movie or tv
        const id = params.get('id');
        const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
        const BASE = "https://api.themoviedb.org/3";
        const IMG = "https://image.tmdb.org/t/p";
        async function fetchTMDB(endpoint, p = {}) {
            const url = new URL(`${BASE}${endpoint}`);
            url.searchParams.set('api_key', TMDB_API_KEY);
            Object.entries(p).forEach(([k,v]) => url.searchParams.set(k,v));
            const res = await fetch(url);
            return res.ok ? res.json() : null;
        }
        function img(path, size='/w500') { return path ? `${IMG}${size}${path}` : ''; }
        async function loadDetails() {
            if (!id || !type) return;
            const data = await fetchTMDB(`/${type}/${id}`, {append_to_response:'credits,videos,recommendations,similar'});
            if (!data) return;
            const title = data.title || data.name;
            const hero = document.getElementById('heroDetail');
            hero.innerHTML = `<div class="backdrop" style="background-image:url('${img(data.backdrop_path, '/w1280')}')"></div><div class="overlay"></div>`;
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <img class="poster" src="${img(data.poster_path)}" alt="${title}">
                <div class="info">
                    <h1>${title} (${(data.release_date||data.first_air_date||'').substring(0,4)})</h1>
                    <p style="color:var(--gold);">⭐ ${data.vote_average?.toFixed(1)} | ${data.runtime ? data.runtime+' min' : data.number_of_seasons ? data.number_of_seasons+' seasons' : ''}</p>
                    <p>${data.overview}</p>
                    <p><strong>Genres:</strong> ${data.genres?.map(g=>g.name).join(', ')}</p>
                    <a href="watch.html?type=${type}&id=${id}" class="btn btn-primary" style="margin:15px 0;">▶ Watch Now</a>
                    <div><strong>Cast:</strong></div>
                    <div class="cast-scroller" id="castScroller"></div>
                    <div style="margin-top:20px;"><strong>Similar</strong></div>
                    <div class="similar-scroller" id="similarScroller"></div>
                </div>`;
            // Cast
            const cast = data.credits?.cast?.slice(0,12) || [];
            document.getElementById('castScroller').innerHTML = cast.map(c => `
                <div class="cast-card"><img src="${img(c.profile_path, '/w185')}" onerror="this.src='data:image/svg+xml,...'"><div>${c.name}</div></div>
            `).join('');
            // Similar
            const similar = (data.similar?.results || data.recommendations?.results || []).filter(s=>s.poster_path).slice(0,12);
            document.getElementById('similarScroller').innerHTML = similar.map(s => `
                <a href="movie.html?type=${s.media_type || type}&id=${s.id}" class="similar-card">
                    <img src="${img(s.poster_path, '/w342')}" loading="lazy">
                    <div style="padding:6px;">${s.title||s.name}</div>
                </a>`).join('');
        }
        loadDetails();
    </script>
</body>
</html>
