<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeStream - Premium Anime Streaming Platform. Watch trending anime, top rated, and latest episodes in HD quality.">
    <meta property="og:title" content="AnimeStream - Premium Anime Streaming">
    <meta property="og:description" content="Watch trending anime, top rated, and latest episodes in HD quality.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://animestream.pages.dev/">
    <meta property="og:image" content="https://animestream.pages.dev/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#0a0a0f">
    <title>AnimeStream - Watch Anime Online in HD</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a25;
            --purple: #8b5cf6;
            --purple-glow: #a78bfa;
            --purple-dark: #6d28d9;
            --accent: #c084fc;
            --text: #e2e8f0;
            --text2: #a1a1aa;
            --text3: #71717a;
            --card-bg: #16161f;
            --card-hover: #1e1e2a;
            --border: #27272a;
            --danger: #ef4444;
            --success: #22c55e;
            --gold: #f59e0b;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --header-h: 64px;
            --hero-h: 520px;
            --hero-h-mobile: 420px;
            --card-w: 170px;
            --card-w-sm: 140px;
            --card-w-lg: 190px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s ease;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(139, 92, 246, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(192, 132, 252, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 60%, rgba(109, 40, 217, 0.03) 0%, transparent 50%);
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            height: var(--header-h);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            transition: var(--transition);
        }
        .header.scrolled {
            background: rgba(10, 10, 15, 0.95);
            border-bottom-color: rgba(139, 92, 246, 0.25);
        }
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
            padding: 8px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            background: none;
            border: none;
            width: 40px;
            height: 36px;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--purple-glow), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            margin: 0 auto 0 0;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 1.1rem;
            position: relative;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.35);
            color: var(--purple-glow);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        /* Search Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .search-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .search-overlay-inner {
            width: 100%;
            max-width: 680px;
            margin-top: 8vh;
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: var(--bg3);
            border-radius: 50px;
            padding: 6px 8px 6px 20px;
            border: 2px solid transparent;
            transition: var(--transition);
            gap: 8px;
        }
        .search-input-wrap:focus-within {
            border-color: var(--purple);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        .search-overlay input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 0;
            outline: none;
            min-width: 0;
        }
        .search-overlay input::placeholder {
            color: var(--text3);
        }
        .search-close {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .search-close:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .search-suggestions {
            margin-top: 12px;
            background: var(--bg2);
            border-radius: var(--radius-lg);
            overflow: hidden;
            max-height: 60vh;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border);
        }
        .search-suggestions.active {
            display: block;
        }
        .search-suggestion-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            text-decoration: none;
            color: var(--text);
        }
        .search-suggestion-item:hover {
            background: rgba(139, 92, 246, 0.1);
        }
        .search-suggestion-item img {
            width: 40px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .search-suggestion-item .sug-info {
            flex: 1;
            min-width: 0;
        }
        .search-suggestion-item .sug-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-suggestion-item .sug-meta {
            font-size: 0.75rem;
            color: var(--text2);
        }

        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg2);
            z-index: 1000;
            padding: 80px 20px 20px;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: var(--transition);
            font-size: 0.95rem;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(139, 92, 246, 0.12);
            color: var(--purple-glow);
        }
        .sidebar .sidebar-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Hero Slider */
        .hero-section {
            position: relative;
            width: 100%;
            height: var(--hero-h);
            overflow: hidden;
            margin-bottom: 8px;
        }
        .hero-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .hero-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            flex-shrink: 0;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            transition: opacity 0.6s ease;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg) 0%, transparent 50%),
                linear-gradient(90deg, rgba(10, 10, 15, 0.9) 0%, transparent 55%),
                linear-gradient(270deg, rgba(10, 10, 15, 0.7) 0%, transparent 40%);
        }
        .hero-content {
            position: absolute;
            bottom: 15%;
            left: clamp(20px, 5vw, 60px);
            max-width: 600px;
            z-index: 2;
            animation: fadeInUp 0.7s ease forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-content .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--purple-glow);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        .hero-content h1 {
            font-size: clamp(1.6rem, 3.5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.7);
            letter-spacing: -0.5px;
        }
        .hero-content .hero-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text2);
        }
        .hero-content .hero-score {
            color: var(--gold);
            font-weight: 700;
        }
        .hero-content .hero-genres {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .hero-content .hero-genre-tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            color: var(--text2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-content .hero-synopsis {
            font-size: 0.9rem;
            color: var(--text2);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
            max-width: 480px;
        }
        .hero-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 4px 24px rgba(139, 92, 246, 0.35);
        }
        .btn-primary:hover {
            background: var(--purple-dark);
            box-shadow: 0 6px 30px rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .hero-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .hero-nav:hover {
            background: rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 24px rgba(139, 92, 246, 0.3);
        }
        .hero-nav.prev {
            left: 16px;
        }
        .hero-nav.next {
            right: 16px;
        }
        .hero-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 5;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 16px;
        }
        .hero-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            flex-shrink: 0;
        }
        .hero-dot.active {
            background: var(--purple-glow);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
            width: 28px;
            border-radius: 10px;
        }
        .hero-skeleton {
            position: absolute;
            inset: 0;
            background: var(--bg3);
            animation: shimmer 1.5s infinite;
            z-index: 1;
        }
        @keyframes shimmer {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }

        /* Widget Section */
        .section {
            padding: 16px clamp(12px, 3vw, 32px) 24px;
            position: relative;
            z-index: 1;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: clamp(1.1rem, 2vw, 1.35rem);
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--purple-glow);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
            flex-shrink: 0;
        }
        .section-see-all {
            color: var(--purple-glow);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }
        .section-see-all:hover {
            color: var(--accent);
        }

        /* Slider Container */
        .slider-wrap {
            position: relative;
            overflow: hidden;
        }
        .slider-track {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 4px 0 8px;
            cursor: grab;
            scroll-snap-type: x proximity;
        }
        .slider-track::-webkit-scrollbar {
            display: none;
        }
        .slider-track:active {
            cursor: grabbing;
        }
        .slider-track.dragging {
            scroll-behavior: auto;
            cursor: grabbing;
            user-select: none;
        }
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
        }
        .slider-wrap:hover .slider-arrow {
            opacity: 1;
            pointer-events: all;
        }
        .slider-arrow:hover {
            background: rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .slider-arrow.prev {
            left: 4px;
        }
        .slider-arrow.next {
            right: 4px;
        }
        @media (hover: none) {
            .slider-arrow {
                display: none;
            }
        }

        /* Anime Card */
        .anime-card {
            flex-shrink: 0;
            width: var(--card-w);
            scroll-snap-align: start;
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card-bg);
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(139, 92, 246, 0.2);
        }
        .anime-card .card-img-wrap {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg3);
        }
        .anime-card .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }
        .anime-card:hover .card-img-wrap img {
            transform: scale(1.08);
        }
        .anime-card .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.85) 100%);
        }
        .anime-card .card-badges {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            z-index: 2;
        }
        .anime-card .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        .badge-score {
            background: rgba(245, 158, 11, 0.9);
            color: #000;
        }
        .badge-ep {
            background: rgba(139, 92, 246, 0.85);
            color: #fff;
        }
        .badge-hd {
            background: rgba(34, 197, 94, 0.85);
            color: #fff;
            font-size: 0.6rem;
        }
        .badge-type {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 0.6rem;
        }
        .anime-card .card-info {
            padding: 10px 10px 12px;
        }
        .anime-card .card-title {
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.25;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text);
        }
        .anime-card .card-sub {
            font-size: 0.7rem;
            color: var(--text3);
            margin-top: 3px;
        }

        /* Skeleton Card */
        .skeleton-card {
            flex-shrink: 0;
            width: var(--card-w);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card-bg);
        }
        .skeleton-card .sk-img {
            aspect-ratio: 3/4;
            background: var(--bg3);
            animation: shimmer 1.5s infinite;
        }
        .skeleton-card .sk-line {
            height: 12px;
            background: var(--bg3);
            border-radius: 4px;
            margin: 10px;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-card .sk-line.short {
            width: 60%;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px 40px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        .footer .footer-credits {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 8px;
        }
        .footer .footer-socials {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        /* Toast */

        }

            transform: translateX(-50%) translateY(0);

        /* Responsive */
        @media (max-width: 768px) {
            :root {

            }

                gap: 10px;
            }
            .sidebar {
                width: 260px;
                left: -280px;
            }
        }
        @media (max-width: 480px) {
            :root {
                --hero-h: 340px;
                --card-w: 120px;
            }
            .hero-content {
                bottom: 8%;
                left: 10px;
            }
            .hero-content h1 {
                font-size: 1.15rem;
            }
            .hero-content .hero-synopsis {
                display: none;
            }
            .hero-content .hero-genres {
                display: none;

                --card-w: var(--card-w-lg);
            }

                padding: 20px clamp(32px, 6vw, 80px) 28px;
            }
        }
    </style>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // CONFIG & STATE
            // ──────────────────────────────────────
            const JIKAN_BASE = 'https://api.jikan.moe/v4';
            const CACHE_TTL = 15 * 60 * 1000; // 15 min
            const RETRY_MAX = 3;
            const TIMEOUT_MS = 12000;
            const DEBOUNCE_MS = 350;

            const state = {
                heroIndex: 0,
                heroData: [],
                heroInterval: null,
                heroPaused: false,
                widgetsLoaded: {},
                searchTimeout: null,
            };

            // ──────────────────────────────────────
            // UTILS
            // ──────────────────────────────────────
            function $(sel, ctx = document) { return ctx.querySelector(sel); }

            function $$(sel, ctx = document) { return Array.from(ctx.querySelectorAll(sel)); }

            function el(tag, attrs = {}, children = []) {
                const e = document.createElement(tag);
                Object.entries(attrs).forEach(([k, v]) => {
                    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
                    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
                    else if (k === 'className') e.className = v;
                    else e.setAttribute(k, v);
                });
                children.forEach(c => { if (typeof c === 'string') e.appendChild(document.createTextNode(c));
                    else if (c) e.appendChild(c); });
                return e;
            }

            function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

            function showToast(msg) {
                const t = $('#toast');
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._tid);
                t._tid = setTimeout(() => t.classList.remove('show'), 2500);
            }

            // ──────────────────────────────────────
            // CACHE
            // ──────────────────────────────────────
            function cacheGet(key) {
                try {
                    const raw = localStorage.getItem('as_' + key);
                    if (!raw) return null;
                    const d = JSON.parse(raw);
                    if (Date.now() - d.ts > CACHE_TTL) { localStorage.removeItem('as_' + key); return null; }
                    return d.data;
                } catch { return null; }
            }

            function cacheSet(key, data) {
                try { localStorage.setItem('as_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
            }

            // ──────────────────────────────────────
            // API FETCH WITH RETRY
            // ──────────────────────────────────────
            async function apiFetch(url, cacheKey = null) {
                if (cacheKey) {
                    const cached = cacheGet(cacheKey);
                    if (cached && Array.isArray(cached) && cached.length > 0) return cached;
                }
                let lastErr;
                for (let attempt = 0; attempt < RETRY_MAX; attempt++) {
                    const controller = new AbortController();
                    const tid = setTimeout(() => controller.abort(), TIMEOUT_MS);
                    try {
                        const resp = await fetch(url, { signal: controller.signal });
                        clearTimeout(tid);
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const json = await resp.json();
                        const data = json?.data || [];
                        if (cacheKey && data.length > 0) cacheSet(cacheKey, data);
                        return data;
                    } catch (err) {
                        clearTimeout(tid);
                        lastErr = err;
                        if (attempt < RETRY_MAX - 1) await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
                    }
                }
                console.warn('API fetch failed after retries:', url, lastErr);
                if (cacheKey) {
                    const stale = cacheGet(cacheKey);
                    if (stale && stale.length > 0) return stale;
                }
                return [];
            }

            // ──────────────────────────────────────
            // SKELETON CARDS
            // ──────────────────────────────────────
            function renderSkeletons(count = 12) {
                const frag = document.createDocumentFragment();
                for (let i = 0; i < count; i++) {
                    const card = el('div', { className: 'skeleton-card' });
                    card.appendChild(el('div', { className: 'sk-img' }));
                    card.appendChild(el('div', { className: 'sk-line' }));
                    card.appendChild(el('div', { className: 'sk-line short' }));
                    frag.appendChild(card);
                }
                return frag;
            }

            // ──────────────────────────────────────
            // ANIME CARD
            // ──────────────────────────────────────
            function createAnimeCard(anime) {
                const img = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
                const title = anime.title_english || anime.title || 'Unknown';
                const score = anime.score || (anime.scored_by ? (anime.scored_by / 10000).toFixed(1) : null);
                const episodes = anime.episodes || '?';
                const type = anime.type || '';
                const malId = anime.mal_id;
                const card = el('a', {
                    href: 'anime.html?id=' + malId,
                    className: 'anime-card',
                });
                const imgWrap = el('div', { className: 'card-img-wrap' });
                const imgEl = el('img', { src: img, alt: title, loading: 'lazy' });
                imgEl.onerror = function() { this.src =
                        'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 227" fill="%231a1a25"><rect width="170" height="227"/><text x="85" y="118" text-anchor="middle" fill="%2371717a" font-size="14">No Image</text></svg>'; };
                imgWrap.appendChild(imgEl);
                imgWrap.appendChild(el('div', { className: 'card-overlay' }));
                const badges = el('div', { className: 'card-badges' });
                if (score) badges.appendChild(el('span', { className: 'badge badge-score' }, ['⭐ ' + score]));
                if (episodes && episodes !== '?' && episodes !== 0) badges.appendChild(el('span', { className: 'badge badge-ep' },
                    ['EP ' + episodes]));
                badges.appendChild(el('span', { className: 'badge badge-hd' }, ['HD']));
                if (type) badges.appendChild(el('span', { className: 'badge badge-type' }, [type]));
                imgWrap.appendChild(badges);
                card.appendChild(imgWrap);
                const info = el('div', { className: 'card-info' });
                info.appendChild(el('div', { className: 'card-title' }, [title]));
                info.appendChild(el('div', { className: 'card-sub' }, [type + ' · ' + (anime.status || 'N/A')]));
                card.appendChild(info);
                return card;
            }

            // ──────────────────────────────────────
            // UNIVERSAL SLIDER
            // ──────────────────────────────────────
            function buildSlider(wrapEl, animeList) {
                wrapEl.innerHTML = '';
                if (!animeList || animeList.length === 0) {
                    wrapEl.innerHTML =
                        '<div style="padding:20px;color:var(--text3);text-align:center;width:100%;">No anime found.</div>';
                    return;
                }
                const track = el('div', { className: 'slider-track' });
                animeList.forEach(a => track.appendChild(createAnimeCard(a)));
                const arrowPrev = el('button', { className: 'slider-arrow prev' }, ['◂']);
                const arrowNext = el('button', { className: 'slider-arrow next' }, ['▸']);
                wrapEl.appendChild(track);
                wrapEl.appendChild(arrowPrev);
                wrapEl.appendChild(arrowNext);
                initSliderScroll(wrapEl, track, arrowPrev, arrowNext);
            }

            function initSliderScroll(wrapEl, track, arrowPrev, arrowNext) {
                let isDown = false,
                    startX, scrollLeft;
                const scrollAmount = 340;

                track.addEventListener('mousedown', e => {
                    isDown = true;
                    track.classList.add('dragging');
                    startX = e.pageX - track.offsetLeft;
                    scrollLeft = track.scrollLeft;
                });
                track.addEventListener('mouseleave', () => { isDown = false;
                    track.classList.remove('dragging'); });
                track.addEventListener('mouseup', () => { isDown = false;
                    track.classList.remove('dragging'); });
                track.addEventListener('mousemove', e => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - track.offsetLeft;
                    const walk = (x - startX) * 2;
                    track.scrollLeft = scrollLeft - walk;
                });
                track.addEventListener('wheel', e => {
                    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                        e.preventDefault();
                        track.scrollLeft += e.deltaY * 2;
                    }
                }, { passive: false });
                arrowPrev.addEventListener('click', () => { track.scrollBy({ left: -scrollAmount, behavior: 'smooth' }); });
                arrowNext.addEventListener('click', () => { track.scrollBy({ left: scrollAmount, behavior: 'smooth' }); });
                // Touch swipe
                let touchStartX = 0;
                track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
                track.addEventListener('touchend', e => {
                    const diff = touchStartX - e.changedTouches[0].clientX;
                    if (Math.abs(diff) > 60) track.scrollBy({ left: diff * 1.5, behavior: 'smooth' });
                });
            }

            // ──────────────────────────────────────
            // HERO SLIDER
            // ──────────────────────────────────────
            function buildHero(animeList) {
                const track = $('#heroTrack');
                const dots = $('#heroDots');
                const skeleton = $('#heroSkeleton');
                track.innerHTML = '';
                dots.innerHTML = '';
                if (!animeList || animeList.length < 3) {
                    skeleton.style.display = 'block';
                    return;
                }
                skeleton.style.display = 'none';
                state.heroData = animeList.slice(0, 15);
                state.heroIndex = 0;
                state.heroData.forEach((anime, i) => {
                    const slide = el('div', { className: 'hero-slide' });
                    const bgUrl = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
                    const bg = el('div', { className: 'hero-bg', style: { backgroundImage: 'url(' + bgUrl +
                            ')' } });
                    const overlay = el('div', { className: 'hero-overlay' });
                    const content = el('div', { className: 'hero-content' });
                    const badge = el('div', { className: 'hero-badge' }, ['🔥 #' + (anime.rank || i + 1) +
                        ' Trending'
                    ]);
                    const title = el('h1', {}, [anime.title_english || anime.title || 'Untitled']);
                    const meta = el('div', { className: 'hero-meta' });
                    if (anime.score) meta.appendChild(el('span', { className: 'hero-score' }, ['⭐ ' + anime
                        .score
                    ]));
                    meta.appendChild(el('span', {}, [anime.type || 'TV']));
                    meta.appendChild(el('span', {}, [anime.status || 'N/A']));
                    const genres = el('div', { className: 'hero-genres' });
                    (anime.genres || []).slice(0, 4).forEach(g => {
                        genres.appendChild(el('span', { className: 'hero-genre-tag' }, [g.name]));
                    });
                    const synopsis = el('p', { className: 'hero-synopsis' }, [anime.synopsis || '']);
                    const btns = el('div', { className: 'hero-btns' });
                    const watchBtn = el('a', { href: 'watch.html?id=' + anime.mal_id + '&ep=1', className: 'btn btn-primary' },
                        ['▶ Watch Now']);
                    const detailsBtn = el('a', { href: 'anime.html?id=' + anime.mal_id,
                    className: 'btn btn-outline' }, ['ℹ Details']);
                    btns.appendChild(watchBtn);
                    btns.appendChild(detailsBtn);
                    content.appendChild(badge);
                    content.appendChild(title);
                    content.appendChild(meta);
                    content.appendChild(genres);
                    content.appendChild(synopsis);
                    content.appendChild(btns);
                    slide.appendChild(bg);
                    slide.appendChild(overlay);
                    slide.appendChild(content);
                    track.appendChild(slide);
                    // Dot
                    const dot = el('button', { className: 'hero-dot' + (i === 0 ? ' active' : '') });
                    dot.addEventListener('click', () => goToHeroSlide(i));
                    dots.appendChild(dot);
                });
                updateHeroPosition();
                startHeroAutoplay();
            }

            function updateHeroPosition() {
                const track = $('#heroTrack');
                track.style.transform = 'translateX(-' + (state.heroIndex * 100) + '%)';
                $$('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === state.heroIndex));
                // Re-animate content
                const slides = $$('.hero-slide');
                slides.forEach((s, i) => {
                    const content = $('.hero-content', s);
                    if (content) content.style.animation = i === state.heroIndex ? 'fadeInUp 0.7s ease forwards' :
                        'none';
                });
            }

            function goToHeroSlide(index) {
                state.heroIndex = clamp(index, 0, state.heroData.length - 1);
                updateHeroPosition();
                resetHeroAutoplay();
            }

            function nextHeroSlide() {
                state.heroIndex = (state.heroIndex + 1) % state.heroData.length;
                updateHeroPosition();
            }

            function prevHeroSlide() {
                state.heroIndex = (state.heroIndex - 1 + state.heroData.length) % state.heroData.length;
                updateHeroPosition();
                resetHeroAutoplay();
            }

            function startHeroAutoplay() {
                stopHeroAutoplay();
                state.heroInterval = setInterval(nextHeroSlide, 5000);
            }

            function stopHeroAutoplay() {
                if (state.heroInterval) clearInterval(state.heroInterval);
            }

            function resetHeroAutoplay() {
                stopHeroAutoplay();
                startHeroAutoplay();
            }

            // Hero drag/swipe
            function initHeroDrag() {
                const section = $('#heroSection');
                let startX = 0,
                    dragged = false;
                section.addEventListener('mousedown', e => { startX = e.clientX;
                    dragged = false;
                    state.heroPaused = true;
                    stopHeroAutoplay(); });
                section.addEventListener('mousemove', e => { if (state.heroPaused && Math.abs(e.clientX - startX) > 25)
                        dragged = true; });
                section.addEventListener('mouseup', e => {
                    if (dragged) {
                        if (e.clientX - startX > 50) prevHeroSlide();
                        else if (startX - e.clientX > 50) nextHeroSlide();
                    }
                    state.heroPaused = false;
                    startHeroAutoplay();
                    dragged = false;
                });
                section.addEventListener('touchstart', e => { startX = e.touches[0].clientX;
                    dragged = false;
                    state.heroPaused = true;
                    stopHeroAutoplay(); }, { passive: true });
                section.addEventListener('touchend', e => {
                    const diff = startX - e.changedTouches[0].clientX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) nextHeroSlide();
                        else prevHeroSlide();
                    }
                    state.heroPaused = false;
                    startHeroAutoplay();
                });
                $('#heroPrev').addEventListener('click', prevHeroSlide);
                $('#heroNext').addEventListener('click', nextHeroSlide);
            }

            // ──────────────────────────────────────
            // WIDGET LOADER
            // ──────────────────────────────────────
            async function loadWidget(sectionId, sliderId, apiUrl, cacheKey) {
                const wrapEl = $(sliderId);
                if (!wrapEl) return;
                wrapEl.innerHTML = '';
                wrapEl.appendChild(renderSkeletons(10));
                const data = await apiFetch(apiUrl, cacheKey);
                buildSlider(wrapEl, data.slice(0, 20));
                state.widgetsLoaded[cacheKey] = true;
            }

            // ──────────────────────────────────────
            // LOAD ALL WIDGETS
            // ──────────────────────────────────────
            async function loadAllWidgets() {
                const results = await Promise.allSettled([
                    loadWidget('sectionTrending', '#sliderTrending', JIKAN_BASE +
                        '/top/anime?filter=airing&limit=20', 'trending'),
                    loadWidget('sectionTopRated', '#sliderTopRated', JIKAN_BASE + '/top/anime?filter=bypopularity&limit=20',
                        'toprated'),
                    loadWidget('sectionAiring', '#sliderAiring', JIKAN_BASE + '/top/anime?filter=airing&limit=20', 'airing'),
                    loadWidget('sectionUpcoming', '#sliderUpcoming', JIKAN_BASE + '/seasons/upcoming?limit=20', 'upcoming'),
                    loadWidget('sectionCompleted', '#sliderCompleted', JIKAN_BASE +
                        '/top/anime?filter=bypopularity&limit=20&type=tv&status=complete', 'completed'),
                    loadWidget('sectionRecent', '#sliderRecent', JIKAN_BASE + '/seasons/now?limit=20', 'recent'),
                ]);
                const failed = results.filter(r => r.status === 'rejected');
                if (failed.length > 0) console.warn('Some widgets failed to load:', failed.length);
                // Retry failed ones once
                if (failed.length > 0) {
                    await new Promise(r => setTimeout(r, 2000));
                    await Promise.allSettled([
                        loadWidget('sectionTrending', '#sliderTrending', JIKAN_BASE +
                            '/top/anime?filter=airing&limit=20', 'trending'),
                        loadWidget('sectionTopRated', '#sliderTopRated', JIKAN_BASE +
                            '/top/anime?filter=bypopularity&limit=20', 'toprated'),
                        loadWidget('sectionAiring', '#sliderAiring', JIKAN_BASE + '/top/anime?filter=airing&limit=20',
                            'airing'),
                        loadWidget('sectionUpcoming', '#sliderUpcoming', JIKAN_BASE + '/seasons/upcoming?limit=20',
                            'upcoming'),
                        loadWidget('sectionCompleted', '#sliderCompleted', JIKAN_BASE +
                            '/top/anime?filter=bypopularity&limit=20&type=tv&status=complete', 'completed'),
                        loadWidget('sectionRecent', '#sliderRecent', JIKAN_BASE + '/seasons/now?limit=20', 'recent'),
                    ]);
                }
            }

            // ──────────────────────────────────────
            // HERO LOADER
            // ──────────────────────────────────────
            async function loadHero() {
                const data = await apiFetch(JIKAN_BASE + '/top/anime?filter=airing&limit=15', 'hero_data');
                if (data.length > 0) buildHero(data);
                else {
                    // Fallback
                    const fallback = await apiFetch(JIKAN_BASE + '/top/anime?limit=15', 'hero_fallback');
                    buildHero(fallback);
                }
            }

            // ──────────────────────────────────────
            // SEARCH OVERLAY
            // ──────────────────────────────────────
            function setupSearch() {
                const overlay = $('#searchOverlay');
                const input = $('#searchInput');
                const suggestions = $('#searchSuggestions');
                const toggle = $('#searchToggle');
                const close = $('#searchClose');

                toggle.addEventListener('click', () => {
                    overlay.classList.add('active');
                    input.focus();
                });
                close.addEventListener('click', () => {
                    overlay.classList.remove('active');
                    input.value = '';
                    suggestions.classList.remove('active');
                    suggestions.innerHTML = '';
                });
                overlay.addEventListener('click', e => {
                    if (e.target === overlay) {
                        overlay.classList.remove('active');
                        input.value = '';
                        suggestions.classList.remove('active');
                        suggestions.innerHTML = '';
                    }
                });
                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape' && overlay.classList.contains('active')) {
                        overlay.classList.remove('active');
                        input.value = '';
                        suggestions.classList.remove('active');
                        suggestions.innerHTML = '';
                    }
                    if (e.ctrlKey && e.key === 'k') {
                        e.preventDefault();
                        overlay.classList.add('active');
                        input.focus();
                    }
                });
                input.addEventListener('input', function() {
                    clearTimeout(state.searchTimeout);
                    const q = this.value.trim();
                    if (q.length < 2) {
                        suggestions.classList.remove('active');
                        suggestions.innerHTML = '';
                        return;
                    }
                    state.searchTimeout = setTimeout(async () => {
                        const data = await apiFetch(JIKAN_BASE + '/anime?q=' + encodeURIComponent(q) +
                            '&limit=8&sfw=true', null);
                        renderSuggestions(data, suggestions);
                    }, DEBOUNCE_MS);
                });
            }

            function renderSuggestions(data, container) {
                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.classList.remove('active');
                    return;
                }
                container.classList.add('active');
                data.slice(0, 8).forEach(anime => {
                    const item = el('a', {
                        href: 'anime.html?id=' + anime.mal_id,
                        className: 'search-suggestion-item',
                    });
                    const img = el('img', { src: anime.images?.jpg?.small_image_url || '', alt: '',
                        loading: 'lazy' });
                    img.onerror = function() { this.style.display = 'none'; };
                    const info = el('div', { className: 'sug-info' });
                    info.appendChild(el('div', { className: 'sug-title' }, [anime.title_english || anime.title ||
                        'Unknown'
                    ]));
                    info.appendChild(el('div', { className: 'sug-meta' }, [(anime.type || 'TV') + ' · ⭐ ' + (
                        anime.score || 'N/A')]));
                    item.appendChild(img);
                    item.appendChild(info);
                    container.appendChild(item);
                });
            }

            // ──────────────────────────────────────
            // SIDEBAR
            // ──────────────────────────────────────
            function setupSidebar() {
                const hamburger = $('#hamburger');
                const sidebar = $('#sidebar');
                const overlay = $('#sidebarOverlay');

                function open() { sidebar.classList.add('active');
                    overlay.classList.add('active');
                    hamburger.classList.add('active'); }

                function close() { sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    hamburger.classList.remove('active'); }
                hamburger.addEventListener('click', () => { sidebar.classList.contains('active') ? close() : open(); });
                overlay.addEventListener('click', close);
                document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
            }

            // ──────────────────────────────────────
            // HEADER SCROLL
            // ──────────────────────────────────────
            function setupHeaderScroll() {
                const header = $('#header');
                let lastScroll = 0;
                window.addEventListener('scroll', () => {
                    const scrollY = window.scrollY;
                    header.classList.toggle('scrolled', scrollY > 50);
                    lastScroll = scrollY;
                }, { passive: true });
            }

            // ──────────────────────────────────────
            // RESIZE OBSERVER
            // ──────────────────────────────────────
            function setupResizeObserver() {
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        updateHeroPosition();
                    }, 250);
                });
                window.addEventListener('orientationchange', () => {
                    setTimeout(updateHeroPosition, 400);
                });
            }

            // ──────────────────────────────────────
            // INIT
            // ──────────────────────────────────────
            async function init() {
                setupSidebar();
                setupSearch();
                setupHeaderScroll();
                initHeroDrag();
                setupResizeObserver();
                // Load hero and widgets concurrently
                await Promise.allSettled([loadHero(), loadAllWidgets()]);
                // Ensure hero loaded
                if (state.heroData.length === 0) {
                    await loadHero();
                }
            }

            // Start
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Export for debugging
            window.__animeStream = { state, buildHero, buildSlider, loadAllWidgets, loadHero };
        })();
    </script>
</body>
</html>
