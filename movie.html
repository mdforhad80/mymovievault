<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CineVerse - Movie and TV Show Details">
    <meta property="og:title" content="CineVerse - Details">
    <meta property="og:description" content="View full details, cast, trailers, and more.">
    <title>CineVerse - Details</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a28; --surface3: #222233;
            --accent: #7c3aed; --accent2: #a855f7; --neon: #00d4ff; --text: #e2e8f0;
            --text2: #a0aec0; --text3: #64748b; --gold: #f59e0b; --radius: 12px;
            --radius-sm: 8px; --radius-lg: 20px; --shadow: 0 4px 30px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 30px rgba(124,58,237,0.3); --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font); overflow-x:hidden; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }
        .header {
            position:fixed; top:0; left:0; right:0; z-index:100; padding:12px 24px;
            display:flex; align-items:center; justify-content:space-between;
            background:rgba(10,10,15,0.85); backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,var(--accent2),var(--neon));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            text-decoration:none;
        }
        .back-btn {
            background:var(--surface2); border:1px solid rgba(255,255,255,0.1); color:var(--text2);
            padding:10px 18px; border-radius:50px; cursor:pointer; font-size:0.9rem; transition:var(--transition);
            text-decoration:none; display:inline-flex; align-items:center; gap:6px;
        }
        .back-btn:hover { border-color:var(--accent); color:#fff; }
        .hero-detail {
            position:relative; height:60vh; min-height:400px; overflow:hidden;
            display:flex; align-items:flex-end; margin-bottom:20px;
        }
        .hero-detail-bg {
            position:absolute; inset:0; background-size:cover; background-position:center top;
            filter:brightness(0.5);
        }
        .hero-detail-gradient {
            position:absolute; inset:0; background:linear-gradient(0deg,var(--bg) 5%, transparent 70%);
        }
        .detail-content {
            position:relative; z-index:2; display:flex; gap:30px; padding:40px;
            max-width:1200px; width:100%; margin:0 auto; flex-wrap:wrap;
        }
        .poster {
            width:220px; height:330px; border-radius:var(--radius); object-fit:cover;
            box-shadow:var(--shadow); flex-shrink:0;
        }
        .info {
            flex:1; min-width:280px; display:flex; flex-direction:column; justify-content:flex-end;
        }
        .info h1 { font-size:2.5rem; font-weight:800; margin-bottom:8px; }
        .meta { display:flex; gap:16px; color:var(--text2); font-size:0.9rem; margin-bottom:12px; flex-wrap:wrap; }
        .genres { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
        .genre-tag {
            background:var(--surface2); padding:6px 14px; border-radius:50px; font-size:0.75rem;
            font-weight:600; letter-spacing:0.5px; border:1px solid rgba(255,255,255,0.1);
        }
        .overview { color:var(--text2); line-height:1.7; margin-bottom:16px; max-width:600px; }
        .btn {
            padding:13px 28px; border-radius:50px; font-weight:600; border:none; cursor:pointer;
            font-size:0.95rem; transition:var(--transition); text-decoration:none; display:inline-flex;
            align-items:center; gap:8px; font-family:var(--font);
        }
        .btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 20px rgba(124,58,237,0.4); }
        .btn-primary:hover { background:var(--accent2); transform:translateY(-2px); }
        .btn-outline {
            background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.2);
        }
        .section { padding:20px 24px; max-width:1200px; margin:0 auto; }
        .section h2 { font-size:1.4rem; margin-bottom:16px; }
        .cast-scroll, .rec-scroll {
            display:flex; gap:14px; overflow-x:auto; padding-bottom:10px;
        }
        .cast-card {
            flex-shrink:0; width:120px; text-align:center; background:var(--surface2);
            border-radius:var(--radius); padding:10px; transition:var(--transition);
        }
        .cast-card img {
            width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:8px;
        }
        .cast-card h4 { font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .cast-card span { font-size:0.7rem; color:var(--text3); }
        .rec-card {
            flex-shrink:0; width:150px; cursor:pointer; transition:var(--transition);
            border-radius:var(--radius); overflow:hidden; text-decoration:none; color:inherit;
        }
        .rec-card img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:var(--radius); }
        .rec-card:hover { transform:translateY(-5px); }
        .rec-card h4 { font-size:0.8rem; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .season-selector, .episode-list { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
        .season-btn, .episode-btn {
            background:var(--surface2); border:1px solid rgba(255,255,255,0.1); color:var(--text2);
            padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.8rem; transition:var(--transition);
        }
        .season-btn.active, .episode-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .trailer-modal {
            position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:none;
            align-items:center; justify-content:center;
        }
        .trailer-modal.active { display:flex; }
        .trailer-modal iframe { width:90%; max-width:900px; height:500px; border-radius:var(--radius); }
        .close-modal {
            position:absolute; top:20px; right:30px; color:#fff; font-size:2rem; cursor:pointer;
        }
        @media (max-width:768px) {
            .detail-content { flex-direction:column; align-items:center; text-align:center; }
            .poster { width:180px; height:270px; }
            .info h1 { font-size:1.8rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">CineVerse</a>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </header>

    <div class="hero-detail" id="heroDetail">
        <div class="hero-detail-bg" id="heroBg"></div>
        <div class="hero-detail-gradient"></div>
        <div class="detail-content" id="detailContent">
            <!-- Filled by JS -->
        </div>
    </div>

    <div class="section" id="castSection"><h2>Cast</h2><div class="cast-scroll" id="castScroll"></div></div>
    <div class="section" id="recSection"><h2>Recommendations</h2><div class="rec-scroll" id="recScroll"></div></div>

    <div class="trailer-modal" id="trailerModal">
        <span class="close-modal" id="closeTrailer">&times;</span>
        <iframe id="trailerFrame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
        const IMG_BASE = "https://image.tmdb.org/t/p";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type') || 'movie'; // movie or tv

        async function fetchTMDB(endpoint) {
            const sep = endpoint.includes('?') ? '&' : '?';
            const res = await fetch(`https://api.themoviedb.org/3${endpoint}${sep}api_key=${TMDB_API_KEY}&language=en-US`);
            return res.ok ? res.json() : null;
        }

        async function loadDetails() {
            const data = await fetchTMDB(`/${type}/${id}`);
            if (!data) return;
            document.title = `CineVerse - ${data.title || data.name}`;
            document.getElementById('heroBg').style.backgroundImage = `url(${IMG_BASE}/original${data.backdrop_path})`;
            const detail = document.getElementById('detailContent');
            const poster = data.poster_path ? `${IMG_BASE}/w500${data.poster_path}` : '';
            const title = data.title || data.name;
            const year = (data.release_date || data.first_air_date || '').slice(0,4);
            const runtime = type==='movie' ? (data.runtime ? `${data.runtime} min` : '') : (data.episode_run_time?.length ? `${data.episode_run_time[0]} min/ep` : '');
            const genres = data.genres?.map(g => `<span class="genre-tag">${g.name}</span>`).join('') || '';
            const rating = data.vote_average?.toFixed(1) || 'N/A';
            const seasons = type==='tv' ? data.number_of_seasons : null;
            detail.innerHTML = `
                ${poster ? `<img class="poster" src="${poster}" alt="${title}">` : ''}
                <div class="info">
                    <h1>${title}</h1>
                    <div class="meta">
                        <span>⭐ ${rating}</span><span>${year}</span>${runtime ? `<span>${runtime}</span>` : ''}
                        ${type==='tv' && seasons ? `<span>${seasons} Seasons</span>` : ''}
                    </div>
                    <div class="genres">${genres}</div>
                    <p class="overview">${data.overview || 'No overview available.'}</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <a href="watch.html?id=${id}&type=${type}" class="btn btn-primary">▶ Watch Now</a>
                        <button class="btn btn-outline" id="playTrailerBtn">▶ Trailer</button>
                    </div>
                    ${type==='tv' ? `<div id="seasonEpisodeSelector" style="margin-top:20px;"></div>` : ''}
                </div>`;
            loadCast();
            loadRecommendations();
            if (type==='tv') loadSeasons(data.seasons);
            document.getElementById('playTrailerBtn')?.addEventListener('click', ()=> loadTrailer());
        }

        async function loadCast() {
            const data = await fetchTMDB(`/${type}/${id}/credits`);
            const container = document.getElementById('castScroll');
            if (!data?.cast) { container.innerHTML = '<p>No cast info</p>'; return; }
            container.innerHTML = data.cast.slice(0,20).map(p => `
                <div class="cast-card">
                    ${p.profile_path ? `<img src="${IMG_BASE}/w185${p.profile_path}" alt="${p.name}">` : '<div style="width:80px;height:80px;border-radius:50%;background:var(--surface3);margin:0 auto 8px;"></div>'}
                    <h4>${p.name}</h4><span>${p.character || ''}</span>
                </div>`).join('');
        }

        async function loadRecommendations() {
            const data = await fetchTMDB(`/${type}/${id}/recommendations`);
            const container = document.getElementById('recScroll');
            if (!data?.results?.length) { container.innerHTML = '<p>No recommendations</p>'; return; }
            container.innerHTML = data.results.slice(0,15).map(r => {
                const t = r.title || r.name;
                const p = r.poster_path ? `${IMG_BASE}/w342${r.poster_path}` : '';
                return `<a href="movie.html?id=${r.id}&type=${type}" class="rec-card">
                    ${p ? `<img src="${p}" alt="${t}">` : '<div style="aspect-ratio:2/3;background:var(--surface3);border-radius:12px;"></div>'}
                    <h4>${t}</h4></a>`;
            }).join('');
        }

        async function loadSeasons(seasons) {
            const container = document.getElementById('seasonEpisodeSelector');
            if (!seasons?.length) return;
            const seasonNumbers = seasons.filter(s=>s.season_number>0).map(s=>s.season_number);
            container.innerHTML = `
                <div class="season-selector" id="seasonSelector">
                    ${seasonNumbers.map(sn => `<button class="season-btn ${sn===1?'active':''}" data-season="${sn}">Season ${sn}</button>`).join('')}
                </div>
                <div class="episode-list" id="episodeList"></div>`;
            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', function(){
                    document.querySelectorAll('.season-btn').forEach(b=>b.classList.remove('active'));
                    this.classList.add('active');
                    loadEpisodes(this.dataset.season);
                });
            });
            loadEpisodes(1);
        }

        async function loadEpisodes(seasonNum) {
            const data = await fetchTMDB(`/tv/${id}/season/${seasonNum}`);
            const container = document.getElementById('episodeList');
            if (!data?.episodes) return;
            container.innerHTML = data.episodes.map(ep => `
                <button class="episode-btn" data-season="${seasonNum}" data-episode="${ep.episode_number}">
                    E${ep.episode_number} - ${ep.name}
                </button>`).join('');
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.addEventListener('click', function(){
                    window.location.href = `watch.html?id=${id}&type=tv&season=${seasonNum}&episode=${this.dataset.episode}`;
                });
            });
        }

        async function loadTrailer() {
            const data = await fetchTMDB(`/${type}/${id}/videos`);
            const trailer = data?.results?.find(v=>v.type==='Trailer' && v.site==='YouTube');
            if (trailer) {
                document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                document.getElementById('trailerModal').classList.add('active');
            } else alert('No trailer available.');
        }

        document.getElementById('closeTrailer').addEventListener('click', ()=>{
            document.getElementById('trailerModal').classList.remove('active');
            document.getElementById('trailerFrame').src = '';
        });

        if (id) loadDetails();
    </script>
</body>
</html>
