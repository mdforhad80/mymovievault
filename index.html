<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Watch Movies & TV Shows Online</title>
<meta name="description" content="Stream the latest movies and TV shows in HD. Trending, popular, top rated content all in one place.">
<meta property="og:title" content="StreamVault — Premium Streaming">
<meta property="og:description" content="Watch movies and TV shows online in HD quality.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   STREAMVAULT — ROOT VARIABLES & RESET
============================================ */
:root {
  --bg: #050508;
  --bg2: #0a0a12;
  --bg3: #0f0f1a;
  --glass: rgba(255,255,255,0.04);
  --glass2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --purple: #7c3aed;
  --purple2: #a855f7;
  --blue: #2563eb;
  --neon: #c084fc;
  --neon2: #818cf8;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --gold: #fbbf24;
  --red: #ef4444;
  --green: #22c55e;
  --radius: 12px;
  --radius2: 20px;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --glow: 0 0 30px rgba(124,58,237,0.3);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

/* ============================================
   HEADER / NAV
============================================ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  height: 70px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  transition: var(--transition);
}
#header.scrolled {
  background: rgba(5,5,8,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.header-left { display: flex; align-items: center; gap: 16px; }
.hamburger-btn {
  width: 40px; height: 40px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; border-radius: 8px;
  transition: var(--transition);
}
.hamburger-btn:hover { background: var(--glass2); }
.hamburger-btn span {
  display: block; width: 22px; height: 2px;
  background: var(--text); border-radius: 2px;
  transition: var(--transition);
}
.header-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--neon), var(--neon2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-logo span { color: var(--purple2); }
.header-center { flex: 1; display: flex; justify-content: center; }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-links a {
  padding: 8px 16px; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  color: var(--text2); transition: var(--transition);
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text); background: var(--glass2);
}
.header-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: var(--transition);
  color: var(--text2);
}
.icon-btn:hover { background: var(--glass2); color: var(--text); }
.icon-btn svg { width: 20px; height: 20px; }

/* ============================================
   SIDEBAR
============================================ */
#sidebar-overlay {
  position: fixed; inset: 0; z-index: 1500;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#sidebar-overlay.active { opacity: 1; pointer-events: all; }
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 1600;
  width: 280px;
  background: linear-gradient(180deg, var(--bg3), var(--bg2));
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding: 24px 0;
  overflow-y: auto;
}
#sidebar.active { transform: translateX(0); }
.sidebar-header {
  padding: 0 24px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--neon), var(--neon2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; color: var(--text2);
  transition: var(--transition);
}
.sidebar-close:hover { background: var(--glass2); color: var(--text); }
.sidebar-nav { padding: 16px 0; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; color: var(--text2);
  font-size: 15px; font-weight: 500;
  transition: var(--transition); border-left: 3px solid transparent;
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  color: var(--text); background: var(--glass);
  border-left-color: var(--purple2);
}
.sidebar-nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-section {
  padding: 8px 24px 4px;
  font-size: 11px; font-weight: 600;
  color: var(--text3); letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ============================================
   SEARCH OVERLAY
============================================ */
#search-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(5,5,8,0.95);
  backdrop-filter: blur(20px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  display: flex; flex-direction: column;
  align-items: center;
  padding-top: 120px;
}
#search-overlay.active { opacity: 1; pointer-events: all; }
.search-input-wrap {
  width: 100%; max-width: 700px;
  position: relative; margin: 0 24px;
}
.search-input-wrap svg {
  position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  width: 22px; height: 22px; color: var(--text3);
}
#search-input {
  width: 100%; padding: 20px 20px 20px 56px;
  background: var(--glass2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  color: var(--text); font-size: 20px;
  outline: none; transition: var(--transition);
}
#search-input:focus {
  border-color: var(--purple2);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
}
#search-input::placeholder { color: var(--text3); }
.search-close-btn {
  position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; color: var(--text2);
  transition: var(--transition);
}
.search-close-btn:hover { background: var(--glass2); color: var(--text); }
#search-results-overlay {
  width: 100%; max-width: 700px;
  margin-top: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
  max-height: 60vh; overflow-y: auto;
}
.search-result-item {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 20px; transition: var(--transition);
  cursor: pointer;
}
.search-result-item:hover { background: var(--glass2); }
.search-result-item + .search-result-item { border-top: 1px solid var(--border); }
.search-result-poster {
  width: 48px; height: 72px;
  object-fit: cover; border-radius: 6px;
  background: var(--bg2); flex-shrink: 0;
}
.search-result-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.search-result-info p { font-size: 13px; color: var(--text2); }
.search-result-badge {
  margin-left: auto; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-movie { background: rgba(124,58,237,0.3); color: var(--purple2); }
.badge-tv { background: rgba(37,99,235,0.3); color: #60a5fa; }

/* ============================================
   HERO SLIDER
============================================ */
#hero {
  position: relative; width: 100%;
  height: 100vh; min-height: 600px;
  overflow: hidden;
}
.hero-slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.8s ease, transform 1.2s ease;
  transform: scale(1.05);
}
.hero-slide.active { opacity: 1; transform: scale(1); }
.hero-slide.prev { opacity: 0; transform: scale(0.97); }
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
  transition: opacity 0.6s;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to right,
    rgba(5,5,8,0.95) 0%,
    rgba(5,5,8,0.7) 40%,
    rgba(5,5,8,0.2) 70%,
    transparent 100%
  ),
  linear-gradient(
    to top,
    rgba(5,5,8,1) 0%,
    rgba(5,5,8,0.4) 30%,
    transparent 60%
  );
}
.hero-content {
  position: absolute;
  bottom: 18%; left: 6%;
  max-width: 580px;
  animation: heroFadeIn 0.8s ease;
}
@keyframes heroFadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero-badges { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.hero-badge {
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
}
.badge-hd { background: rgba(124,58,237,0.4); color: var(--neon); border: 1px solid rgba(192,132,252,0.3); }
.badge-rating { background: rgba(251,191,36,0.2); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); display: flex; align-items: center; gap: 4px; }
.badge-genre { background: var(--glass2); color: var(--text2); border: 1px solid var(--border); }
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 6vw, 80px);
  line-height: 1; letter-spacing: 2px;
  margin-bottom: 16px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.hero-overview {
  font-size: 15px; color: var(--text2);
  line-height: 1.7; margin-bottom: 28px;
  display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: var(--radius);
  font-size: 15px; font-weight: 600;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: white;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  transition: var(--transition);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,58,237,0.6);
}
.btn-secondary {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: var(--radius);
  font-size: 15px; font-weight: 600;
  background: var(--glass2);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
.btn-primary svg, .btn-secondary svg { width: 20px; height: 20px; }

/* Hero Controls */
.hero-controls {
  position: absolute; bottom: 8%; right: 6%;
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 20px;
}
.hero-dots { display: flex; gap: 8px; }
.hero-dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.3);
  cursor: pointer; transition: var(--transition);
}
.hero-dot.active {
  width: 24px; background: var(--purple2);
}
.hero-arrows { display: flex; gap: 8px; }
.hero-arrow {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--glass2);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  color: var(--text); transition: var(--transition);
}
.hero-arrow:hover { background: var(--purple); border-color: var(--purple); }
.hero-arrow svg { width: 18px; height: 18px; }
.hero-bottom-fade {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 200px;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  pointer-events: none;
}

/* ============================================
   CONTENT SECTIONS
============================================ */
.content-section { padding: 0 0 48px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; margin-bottom: 20px;
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 1.5px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::before {
  content: ''; display: block;
  width: 4px; height: 24px; border-radius: 2px;
  background: linear-gradient(to bottom, var(--purple2), var(--neon2));
}
.section-see-all {
  font-size: 13px; color: var(--purple2);
  font-weight: 500; display: flex; align-items: center; gap: 4px;
  transition: var(--transition);
}
.section-see-all:hover { color: var(--neon); }

/* ============================================
   SLIDER SYSTEM
============================================ */
.slider-wrap {
  position: relative;
  padding: 0 24px;
}
.slider-track-container {
  overflow: hidden;
  border-radius: var(--radius);
  cursor: grab;
}
.slider-track-container:active { cursor: grabbing; }
.slider-track {
  display: flex; gap: 14px;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  padding: 8px 0 16px;
}
.slider-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(to right, rgba(5,5,8,0.95), rgba(10,10,18,0.8));
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  color: var(--text); z-index: 10;
  border-radius: 8px; transition: var(--transition);
  opacity: 0;
}
.slider-wrap:hover .slider-btn { opacity: 1; }
.slider-btn:hover { background: var(--purple); border-color: var(--purple); }
.slider-btn.prev { left: 0; border-radius: 0 8px 8px 0; }
.slider-btn.next { right: 0; border-radius: 8px 0 0 8px; }
.slider-btn.disabled { opacity: 0 !important; pointer-events: none; }
.slider-btn svg { width: 20px; height: 20px; }

/* ============================================
   MOVIE / TV CARDS
============================================ */
.media-card {
  flex: 0 0 auto;
  width: 160px;
  cursor: pointer; position: relative;
  transition: var(--transition);
  border-radius: var(--radius);
  overflow: hidden;
}
.media-card:hover { transform: scale(1.06) translateY(-6px); z-index: 10; }
.media-card:hover .card-overlay { opacity: 1; }
.card-poster {
  width: 100%; aspect-ratio: 2/3;
  object-fit: cover;
  background: var(--bg3);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.media-card:hover .card-poster { border-color: var(--purple); box-shadow: 0 0 0 2px rgba(124,58,237,0.4); }
.card-overlay {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  background: linear-gradient(to top, rgba(5,5,8,0.95) 0%, rgba(5,5,8,0.4) 50%, transparent 100%);
  opacity: 0; transition: var(--transition);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 12px;
}
.card-play-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--purple);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
  box-shadow: 0 4px 15px rgba(124,58,237,0.5);
  transition: var(--transition);
}
.card-play-btn:hover { transform: scale(1.1); background: var(--purple2); }
.card-play-btn svg { width: 16px; height: 16px; }
.card-info-overlay { text-align: center; }
.card-title-overlay { font-size: 12px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.card-year-overlay { font-size: 11px; color: var(--text2); }
.card-badges {
  position: absolute; top: 8px; left: 8px;
  display: flex; gap: 4px; flex-direction: column; align-items: flex-start;
}
.card-badge {
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
}
.card-badge-hd { background: rgba(124,58,237,0.8); color: white; }
.card-badge-rating {
  background: rgba(0,0,0,0.7); color: var(--gold);
  display: flex; align-items: center; gap: 3px;
  backdrop-filter: blur(4px);
}
.card-badge-rating svg { width: 9px; height: 9px; fill: var(--gold); }

/* Skeleton Loading */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-card { width: 160px; flex: 0 0 auto; }
.skeleton-poster { width: 160px; aspect-ratio: 2/3; }

/* ============================================
   FOOTER
============================================ */
footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 40px 24px 24px;
  text-align: center;
}
.footer-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--neon), var(--neon2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 24px;
}
.footer-socials { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
.footer-social {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px; background: var(--glass2);
  border: 1px solid var(--border);
  color: var(--text2); transition: var(--transition);
}
.footer-social:hover { background: var(--purple); border-color: var(--purple); color: white; transform: translateY(-3px); }
.footer-social svg { width: 20px; height: 20px; }
.footer-copy { font-size: 13px; color: var(--text3); }
.footer-copy span { color: var(--purple2); }

/* ============================================
   RESPONSIVE
============================================ */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero-content { left: 20px; right: 20px; max-width: none; bottom: 22%; }
  .hero-title { font-size: 36px; }
  .hero-controls { right: 20px; }
  .media-card { width: 130px; }
  .skeleton-card { width: 130px; }
  .skeleton-poster { width: 130px; }
  .section-header { padding: 0 16px; }
  .slider-wrap { padding: 0 16px; }
}
@media (max-width: 480px) {
  .media-card { width: 110px; }
  .skeleton-card { width: 110px; }
  .skeleton-poster { width: 110px; }
  .hero-actions { gap: 8px; }
  .btn-primary, .btn-secondary { padding: 12px 20px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- ============================================
     SIDEBAR OVERLAY
============================================ -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ============================================
     SIDEBAR
============================================ -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">StreamVault</div>
    <button class="sidebar-close" onclick="closeSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section">Navigation</div>
    <a href="index.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="trending.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Trending
    </a>
    <a href="search.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </a>

<script>
/* ============================================
   STREAMVAULT — MAIN JAVASCRIPT
============================================ */

const TMDB_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
const TMDB_BASE = "https://api.themoviedb.org/3";
const IMG_BASE = "https://image.tmdb.org/t/p/";

/* ============================================
   UTILITIES
============================================ */
async function tmdbFetch(endpoint, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(`${TMDB_BASE}${endpoint}&api_key=${TMDB_KEY}`, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      if (i === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

function imgUrl(path, size = 'w500') {
  return path ? `${IMG_BASE}${size}${path}` : 'https://via.placeholder.com/200x300/0f0f1a/7c3aed?text=No+Image';
}

function getRating(r) { return r ? r.toFixed(1) : 'N/A'; }
function getYear(d) { return d ? d.slice(0, 4) : ''; }
function truncate(str, n) { return str && str.length > n ? str.slice(0, n) + '…' : (str || ''); }

/* ============================================
   HEADER SCROLL EFFECT
============================================ */
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

/* ============================================
   SIDEBAR
============================================ */
function openSidebar() {
  document.getElementById('sidebar').classList.add('active');
  document.getElementById('sidebar-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('sidebar-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

/* ============================================
   SEARCH
============================================ */
let searchTimer = null;
function openSearch() {
  document.getElementById('search-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('active');
  document.body.style.overflow = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-results-overlay').innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSearch(); closeSidebar(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('search-results-overlay').innerHTML = ''; return; }
  searchTimer = setTimeout(() => performSearch(q), 350);
});

async function performSearch(q) {
  const el = document.getElementById('search-results-overlay');
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">Searching…</div>';
  try {
    const data = await tmdbFetch(`/search/multi?query=${encodeURIComponent(q)}&page=1&`);
    const items = (data.results || []).filter(r => r.media_type !== 'person').slice(0, 8);
    if (!items.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">No results found.</div>'; return; }
    el.innerHTML = items.map(item => {
      const title = item.title || item.name || 'Unknown';
      const year = getYear(item.release_date || item.first_air_date);
      const type = item.media_type === 'tv' ? 'TV' : 'Movie';
      const badgeClass = item.media_type === 'tv' ? 'badge-tv' : 'badge-movie';
      return `<div class="search-result-item" onclick="goTo('${item.media_type}',${item.id})">
        <img class="search-result-poster" src="${imgUrl(item.poster_path,'w92')}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/48x72/0f0f1a/7c3aed?text=?'">
        <div class="search-result-info"><h4>${title}</h4><p>${year} • ⭐ ${getRating(item.vote_average)}</p></div>
        <span class="search-result-badge ${badgeClass}">${type}</span>
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">Search failed. Try again.</div>'; }
}

function goTo(type, id) {
  window.location.href = `movie.html?id=${id}&type=${type}`;
}

/* ============================================
   HERO SLIDER
============================================ */
let heroSlides = [];
let heroIndex = 0;
let heroTimer = null;
let heroTouchStartX = 0;

async function initHero() {
  try {
    const [movies, tv] = await Promise.allSettled([
      tmdbFetch('/trending/movie/week?'),
      tmdbFetch('/trending/tv/week?')
    ]);
    const movieItems = (movies.value?.results || []).slice(0, 6).map(m => ({ ...m, media_type: 'movie' }));
    const tvItems = (tv.value?.results || []).slice(0, 5).map(t => ({ ...t, media_type: 'tv' }));
    heroSlides = [...movieItems, ...tvItems].filter(s => s.backdrop_path);
    if (!heroSlides.length) return;
    renderHero();
    startHeroAuto();
  } catch (e) { console.error('Hero error:', e); }
}

function renderHero() {
  const container = document.getElementById('hero-slides-container');
  const dotsEl = document.getElementById('hero-dots');
  container.innerHTML = '';
  dotsEl.innerHTML = '';

  heroSlides.forEach((item, i) => {
    const title = item.title || item.name || '';
    const overview = truncate(item.overview || '', 200);
    const year = getYear(item.release_date || item.first_air_date);
    const rating = getRating(item.vote_average);
    const type = item.media_type;
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="hero-bg" style="background-image:url('${imgUrl(item.backdrop_path,'original')}')"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badges">
          <span class="hero-badge badge-hd">HD</span>
          <span class="hero-badge badge-rating">⭐ ${rating}</span>
          <span class="hero-badge badge-genre">${year}</span>
          <span class="hero-badge badge-genre">${type === 'tv' ? 'TV Show' : 'Movie'}</span>
        </div>
        <h1 class="hero-title">${title}</h1>
        <p class="hero-overview">${overview}</p>
        <div class="hero-actions">
          <a href="watch.html?id=${item.id}&type=${type}" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Watch Now
          </a>
          <a href="movie.html?id=${item.id}&type=${type}" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            More Info
          </a>
        </div>
      </div>`;
    container.appendChild(slide);

    const dot = document.createElement('button');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Slide ${i + 1}`);
    dot.onclick = () => goToHeroSlide(i);
    dotsEl.appendChild(dot);
  });

  document.getElementById('hero-prev').onclick = () => { goToHeroSlide((heroIndex - 1 + heroSlides.length) % heroSlides.length); };
  document.getElementById('hero-next').onclick = () => { goToHeroSlide((heroIndex + 1) % heroSlides.length); };

  // Touch support
  const hero = document.getElementById('hero');
  hero.addEventListener('touchstart', e => { heroTouchStartX = e.touches[0].clientX; }, { passive: true });
  hero.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - heroTouchStartX;
    if (Math.abs(dx) > 50) goToHeroSlide(dx < 0 ? (heroIndex + 1) % heroSlides.length : (heroIndex - 1 + heroSlides.length) % heroSlides.length);
  }, { passive: true });
}

function goToHeroSlide(idx) {
  if (idx === heroIndex) return;
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.hero-dot');
  slides[heroIndex]?.classList.remove('active');
  dots[heroIndex]?.classList.remove('active');
  heroIndex = idx;
  slides[heroIndex]?.classList.add('active');
  dots[heroIndex]?.classList.add('active');
  resetHeroAuto();
}

function startHeroAuto() {
  heroTimer = setInterval(() => goToHeroSlide((heroIndex + 1) % heroSlides.length), 6000);
}
function resetHeroAuto() {
  clearInterval(heroTimer);
  startHeroAuto();
}

/* ============================================
   UNIVERSAL SLIDER SYSTEM
============================================ */
function createSlider(containerId) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return null;
  const track = wrap.querySelector('.slider-track');
  const prevBtn = wrap.querySelector('.slider-btn.prev');
  const nextBtn = wrap.querySelector('.slider-btn.next');
  if (!track) return null;

  let pos = 0;
  let isDragging = false;
  let startX = 0;
  let startPos = 0;

  function getMax() {
    return -(track.scrollWidth - track.parentElement.offsetWidth + 48);
  }

  function updateBtns() {
    prevBtn?.classList.toggle('disabled', pos >= 0);
    nextBtn?.classList.toggle('disabled', pos <= getMax());
  }

  function move(newPos) {
    pos = Math.max(getMax(), Math.min(0, newPos));
    track.style.transform = `translateX(${pos}px)`;
    updateBtns();
  }

  const cardW = 174; // card width + gap
  prevBtn?.addEventListener('click', () => move(pos + cardW * 4));
  nextBtn?.addEventListener('click', () => move(pos - cardW * 4));

  // Drag
  track.addEventListener('mousedown', e => {
    isDragging = true; startX = e.clientX; startPos = pos;
    track.style.transition = 'none'; e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    move(startPos + (e.clientX - startX));
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    track.style.transition = '';
  });

  // Touch
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startPos = pos; track.style.transition = 'none'; }, { passive: true });
  track.addEventListener('touchmove', e => { move(startPos + (e.touches[0].clientX - startX)); }, { passive: true });
  track.addEventListener('touchend', () => { track.style.transition = ''; }, { passive: true });

  // Mouse wheel
  track.parentElement.addEventListener('wheel', e => {
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
    e.preventDefault();
    move(pos - e.deltaY * 2);
  }, { passive: false });

  updateBtns();
  return { move, updateBtns };
}

function createCard(item, type) {

        <div class="card-year-overlay">${year}</div>
      </div>
    </div>
  </div>`;
}

async function loadSection(sec) {
  try {
    const data = await tmdbFetch(`${sec.endpoint}page=1`);
    const items = (data.results || []).slice(0, 20);
    const track = document.getElementById(`${sec.id}-track`);
    if (!track) return;
    track.innerHTML = items.map(item => createCard(item, sec.type)).join('');
    createSlider(`${sec.id}-wrap`);
  } catch (e) {
    const track = document.getElementById(`${sec.id}-track`);
    if (track) track.innerHTML = '<div style="color:var(--text3);padding:20px">Failed to load content</div>';
  }
}

/* ============================================
   INIT
============================================ */
async function init() {
  // Build skeleton sections
  const main = document.getElementById('main-content');
  sections.forEach(sec => {
    main.insertAdjacentHTML('beforeend', createSkeletonSection(sec.id, sec.title));
  });

  // Load hero and all sections in parallel
  const tasks = [
    initHero(),
    ...sections.map(sec => loadSection(sec))
  ];
  await Promise.allSettled(tasks);
}

init();
</script>
</body>
</html>
