<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiCrush – Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#202125">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <button id="menuToggle" aria-label="Toggle navigation">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <a href="/" class="logo">
                    <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgJBvjfn0ipFH7g05i8AE_qEDmqhVXzfWRXcjuYoS48lB6ZleKgURM3nHSMnczPFlxRGkwBxUo4xJe-W0ozjUXUwgC-pwcJvSWsm3PI9EunZYlSGgdnidY4Aqi5FjSxyPavgk_36BnbaX7dYWKphv9c2AhZjUyFj16ZCR_O8pIiTJM5gK195dHaOfbPnVzh=s512" alt="KaiCrush">
                </a>
                <div class="search-box">
                    <form action="search.html" method="get">
                        <input type="text" name="q" placeholder="Search anime..." autocomplete="off">
                        <button type="submit" aria-label="Search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        </button>
                    </form>
                </div>
                <div class="header-actions">
                    <a href="/schedule.html" class="icon-btn" aria-label="Schedule">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
                    </a>
                    <a href="/search.html" class="icon-btn mobile-search" aria-label="Search">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    </a>
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <div class="nav-section">
                    <a href="/" class="nav-link active"><span>Home</span></a>
                    <a href="/search.html" class="nav-link"><span>Search</span></a>
                    <a href="/schedule.html" class="nav-link"><span>Schedule</span></a>
                    <a href="/creator.html" class="nav-link"><span>Creator</span></a>
                </div>
                <div class="nav-section">
                    <h3>Genres</h3>
                    <div class="genre-list" id="genreList"></div>
                </div>
                <div class="sidebar-footer">
                    <button class="toggle-nsfw" id="nsfwToggle">NSFW</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <section class="featured-section" id="featuredSlider">
                <div class="slider-container">
                    <div class="slider-wrapper" id="featuredWrapper"></div>
                    <button class="slider-prev">‹</button>
                    <button class="slider-next">›</button>
                </div>
            </section>

            <section class="section" id="latestReleases">
                <div class="section-header">
                    <h2>Latest Releases</h2>
                    <a href="/search.html" class="view-all">View All</a>
                </div>
                <div class="anime-grid" id="latestGrid"></div>
            </section>

            <section class="section" id="trending">
                <div class="section-header">
                    <h2>Trending</h2>
                </div>
                <div class="anime-grid" id="trendingGrid"></div>
            </section>

            <section class="section" id="continueWatching">
                <div class="section-header">
                    <h2>Continue Watching</h2>
                </div>
                <div class="anime-grid" id="continueGrid"></div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2025 KaiCrush – Powered by Jikan & MyAnimeList</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
