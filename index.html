<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StreamVault - Premium Movie & TV Series Streaming Platform. Watch trending movies and TV shows online.">
    <meta name="keywords" content="streaming, movies, tv series, watch online, free movies, tv shows">
    <meta property="og:title" content="StreamVault - Premium Streaming">
    <meta property="og:description" content="Watch trending movies and TV series online.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0a0a0a">
    <title>StreamVault - Premium Movie & TV Streaming</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1a1a1a;
            --surface3: #1f1f1f;
            --text: #e5e5e5;
            --text2: #b3b3b3;
            --text3: #777;
            --accent: #7c3aed;
            --accent2: #a855f7;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --gradient: linear-gradient(135deg, #7c3aed, #4f46e5, #6366f1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 20px;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --header-height: 64px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-height);
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            transition: var(--transition);
        }
        .header.scrolled {
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1001;
            border-radius: 50%;
            transition: var(--transition);
        }
        .hamburger:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            flex-shrink: 0;
            cursor: pointer;
        }
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .search-trigger:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }
        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            z-index: 999;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text2);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.95rem;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(124, 58, 237, 0.15);
            color: #fff;
        }
        .sidebar a .icon {
            width: 22px;
            text-align: center;
            font-size: 1.1rem;
        }
        /* Search overlay */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .search-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .search-container {
            width: 90%;
            max-width: 650px;
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: var(--surface2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 6px 6px 6px 20px;
            transition: var(--transition);
        }
        .search-input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }
        .search-input-wrap input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 0;
            outline: none;
            font-family: var(--font);
        }
        .search-input-wrap button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .search-input-wrap button:hover {
            background: var(--accent2);
            box-shadow: var(--shadow-glow);
        }
        .search-results-drop {
            margin-top: 12px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            max-height: 60vh;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .search-results-drop.active {
            display: block;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .search-result-item:hover {
            background: rgba(124, 58, 237, 0.1);
        }
        .search-result-item img {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }
        .search-close {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .search-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        /* Hero slider */
        .hero {
            position: relative;
            width: 100%;
            height: 85vh;
            min-height: 500px;
            overflow: hidden;
            margin-top: 0;
        }
        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: flex-end;
            padding: 60px 40px 80px;
        }
        .hero-slide.active {
            opacity: 1;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            z-index: 0;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, #0a0a0a 5%, transparent 50%, rgba(10, 10, 10, 0.4) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }
        .hero-content h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }
        .hero-content .meta {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text2);
        }
        .hero-content .meta .rating {
            color: #f5c518;
            font-weight: 700;
        }
        .hero-content p {
            font-size: 0.95rem;
            color: var(--text2);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.7);
        }
        .hero-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent2);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }
        .hero-nav {
            position: absolute;
            bottom: 30px;
            right: 40px;
            z-index: 3;
            display: flex;
            gap: 10px;
        }
        .hero-nav button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .hero-nav button:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        .hero-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 8px;
        }
        .hero-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: var(--transition);
        }
        .hero-dots span.active {
            background: #fff;
            width: 28px;
            border-radius: 10px;
        }
        /* Content sections */
        .section {
            padding: 20px 20px 10px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .section-header a {
            color: var(--accent2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .section-header a:hover {
            color: #fff;
        }
        .scroll-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-row::-webkit-scrollbar {
            height: 4px;
        }
        .card {
            flex-shrink: 0;
            width: 170px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            scroll-snap-align: start;
            background: var(--surface2);
        }
        .card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: var(--shadow-glow);
            z-index: 5;
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            transition: var(--transition);
        }
        .card:hover img {
            transform: scale(1.05);
        }
        .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            z-index: 2;
        }
        .card-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #f5c518;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
            backdrop-filter: blur(4px);
        }
        .card-info {
            padding: 10px;
        }
        .card-info h3 {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-info span {
            font-size: 0.75rem;
            color: var(--text3);
        }
        /* Skeleton */
        .skeleton {
            animation: shimmer 1.5s infinite;
            background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            border-radius: var(--radius);
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        .skeleton-card {
            width: 170px;
            flex-shrink: 0;
            aspect-ratio: 2/3;
            border-radius: var(--radius);
        }
        /* Footer */
        .footer {
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 40px 20px 20px;
            text-align: center;
            margin-top: 40px;
        }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .footer-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .footer-links a:hover {
            color: var(--accent2);
        }
        .footer p {
            color: var(--text3);
            font-size: 0.8rem;
        }
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            box-shadow: var(--shadow-glow);
        }
        .back-to-top.visible {
            opacity: 1;
            pointer-events: all;
        }
        .back-to-top:hover {
            background: var(--accent2);
            transform: translateY(-3px);
        }
        @media (max-width: 768px) {
            .hero {
                height: 60vh;
                min-height: 400px;
            }
            .hero-slide {
                padding: 40px 16px 60px;
            }
            .hero-content {
                max-width: 100%;
            }
            .card {
                width: 140px;
            }
            .section {
                padding: 14px 10px 8px;
            }
            .hero-nav {
                right: 10px;
                bottom: 15px;
            }
            .hero-dots {
                bottom: 15px;
            }
            .sidebar {
                width: 260px;
            }
            .header {
                padding: 0 12px;
                gap: 8px;
            }
            .logo {
                font-size: 1.3rem;
            }
        }
        @media (max-width: 480px) {
            .card {
                width: 115px;
            }
            .hero-content h1 {
                font-size: 1.4rem;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
            .hero-btns {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header" id="header">
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <a href="index.html" class="logo">StreamVault</a>
        <div class="header-right">
            <button class="search-trigger" id="searchTrigger" aria-label="Search">
                🔍 <span>Search</span>
            </button>
        </div>
    </header>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar" id="sidebar">
        <a href="index.html" class="active"><span class="icon">🏠</span> Home</a>
        <a href="trending.html"><span class="icon">🔥</span> Trending</a>
        <a href="search.html"><span class="icon">🔍</span> Search</a>
        <a href="movie.html"><span class="icon">🎬</span> Discover</a>
        <a href="creator.html"><span class="icon">👤</span> Creator</a>
    </nav>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
        <button class="search-close" id="searchClose">✕</button>
        <div class="search-container">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="search-results-drop" id="searchResultsDrop"></div>
        </div>
    </div>

    <!-- HERO SLIDER -->
    <section class="hero" id="hero">
        <div class="hero-nav">
            <button id="heroPrev">◀</button><button id="heroNext">▶</button>
        </div>
        <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- CONTENT SECTIONS -->
    <main id="mainContent">
        <!-- Dynamically filled -->
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="trending.html">Trending</a>
            <a href="search.html">Search</a>
            <a href="creator.html">Creator</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
        <p>© 2026 StreamVault. All rights reserved. Data from TMDB.</p>
        <p style="margin-top:4px;">This site does not host any files. All content is provided via third-party embeds.</p>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

    <script>
        const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
        const TMDB_IMG = "https://image.tmdb.org/t/p/";
        const API_BASE = "https://api.themoviedb.org/3";

        // Utility: Fetch from TMDB
        async function fetchTMDB(endpoint, params = {}) {
            const url = new URL(`${API_BASE}${endpoint}`);
            url.searchParams.set('api_key', TMDB_API_KEY);
            url.searchParams.set('language', 'en-US');
            for (const [k, v] of Object.entries(params)) {
                url.searchParams.set(k, v);
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error(`TMDB error: ${res.status}`);
            return res.json();
        }

        // Image URL helper
        function imgUrl(path, size = 'w500') {
            return path ? `${TMDB_IMG}${size}${path}` : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" fill="%231a1a1a"><rect width="300" height="450"/><text x="150" y="230" text-anchor="middle" fill="%23555" font-size="18">No Image</text></svg>';
        }

        function backdropUrl(path, size = 'original') {
            return path ? `${TMDB_IMG}${size}${path}` : '';
        }

        // ============ SIDEBAR ============
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active', !isActive);
            sidebarOverlay.classList.toggle('active', !isActive);
            hamburger.classList.toggle('active', !isActive);
            document.body.style.overflow = isActive ? '' : 'hidden';
        }
        hamburger.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('active')) toggleSidebar();
        });

        // ============ SEARCH OVERLAY ============
        const searchTrigger = document.getElementById('searchTrigger');
        const searchOverlay = document.getElementById('searchOverlay');
        const searchClose = document.getElementById('searchClose');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResultsDrop = document.getElementById('searchResultsDrop');

        searchTrigger.addEventListener('click', () => {
            searchOverlay.classList.add('active');
            searchInput.focus();
            document.body.style.overflow = 'hidden';
        });
        searchClose.addEventListener('click', () => {
            searchOverlay.classList.remove('active');
            searchResultsDrop.classList.remove('active');
            searchResultsDrop.innerHTML = '';
            document.body.style.overflow = '';
        });
        searchOverlay.addEventListener('click', (e) => {
            if (e.target === searchOverlay) {
                searchOverlay.classList.remove('active');
                searchResultsDrop.classList.remove('active');
                searchResultsDrop.innerHTML = '';
                document.body.style.overflow = '';
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
                searchOverlay.classList.remove('active');
                searchResultsDrop.classList.remove('active');
                searchResultsDrop.innerHTML = '';
                document.body.style.overflow = '';
            }
        });

        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();
            if (query.length < 2) {
                searchResultsDrop.classList.remove('active');
                searchResultsDrop.innerHTML = '';
                return;
            }
            searchTimeout = setTimeout(() => liveSearch(query), 350);
        });

        async function liveSearch(query) {
            try {
                const data = await fetchTMDB('/search/multi', { query, page: 1 });
                const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type ===
                    'tv').slice(0, 8);
                if (results.length === 0) {
                    searchResultsDrop.innerHTML =
                        '<div style="padding:20px;text-align:center;color:var(--text3);">No results found</div>';
                    searchResultsDrop.classList.add('active');
                    return;
                }
                searchResultsDrop.innerHTML = results.map(r => {
                    const title = r.title || r.name;
                    const year = (r.release_date || r.first_air_date || '').slice(0, 4);
                    const poster = imgUrl(r.poster_path, 'w185');
                    const type = r.media_type === 'tv' ? 'TV' : 'Movie';
                    const id = r.id;
                    return `<div class="search-result-item" onclick="goToDetail('${r.media_type}', ${id})">
                <img src="${poster}" alt="${title}" loading="lazy">
                <div><strong>${title}</strong><br><small>${type} • ${year || 'N/A'}</small></div>
              </div>`;
                }).join('');
                searchResultsDrop.classList.add('active');
            } catch (e) {
                console.error('Search error:', e);
            }
        }

        function goToDetail(type, id) {
            searchOverlay.classList.remove('active');
            searchResultsDrop.classList.remove('active');
            searchResultsDrop.innerHTML = '';
            document.body.style.overflow = '';
            window.location.href = `movie.html?type=${type}&id=${id}`;
        }
        searchBtn.addEventListener('click', () => {
            const q = searchInput.value.trim();
            if (q) {
                window.location.href = `search.html?q=${encodeURIComponent(q)}`;
                searchOverlay.classList.remove('active');
                searchResultsDrop.classList.remove('active');
                searchResultsDrop.innerHTML = '';
                document.body.style.overflow = '';
            }
        });
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const q = searchInput.value.trim();
                if (q) {
                    window.location.href = `search.html?q=${encodeURIComponent(q)}`;
                    searchOverlay.classList.remove('active');
                    searchResultsDrop.classList.remove('active');
                    searchResultsDrop.innerHTML = '';
                    document.body.style.overflow = '';
                }
            }
        });

        // ============ HERO SLIDER ============
        let heroSlides = [];
        let heroIndex = 0;
        let heroInterval;
        const heroContainer = document.getElementById('hero');
        const heroDots = document.getElementById('heroDots');

        async function loadHero() {
            try {
                const [trendMovies, trendTV] = await Promise.all([
                    fetchTMDB('/trending/movie/week'),
                    fetchTMDB('/trending/tv/week')
                ]);
                const movies = (trendMovies.results || []).slice(0, 5).map(m => ({ ...m, media_type: 'movie' }));
                const tvs = (trendTV.results || []).slice(0, 5).map(t => ({ ...t, media_type: 'tv', title: t.name,
                    release_date: t.first_air_date }));
                heroSlides = [...movies, ...tvs].sort(() => Math.random() - 0.5).slice(0, 8);
                if (heroSlides.length === 0) return;
                renderHeroSlides();
                heroIndex = 0;
                showHeroSlide(0);
                startHeroAutoplay();
            } catch (e) {
                console.error('Hero load error:', e);
                heroContainer.innerHTML =
                    '<div style="height:50vh;display:flex;align-items:center;justify-content:center;color:var(--text3);">🎬 StreamVault Premium</div>';
            }
        }

        function renderHeroSlides() {
            heroContainer.innerHTML = heroSlides.map((item, i) => {
                const title = item.title || item.name;
                const overview = item.overview || '';
                const rating = (item.vote_average || 0).toFixed(1);
                const year = (item.release_date || item.first_air_date || '').slice(0, 4);
                const bg = backdropUrl(item.backdrop_path);
                const type = item.media_type;
                const id = item.id;
                return `<div class="hero-slide${i===0?' active':''}" data-index="${i}">
              <div class="hero-bg" style="background-image:url('${bg}')"></div>
              <div class="hero-content">
                <h1>${title}</h1>
                <div class="meta"><span class="rating">⭐ ${rating}</span><span>${year||'N/A'}</span><span>${type==='tv'?'TV Series':'Movie'}</span></div>
                <p>${overview}</p>
                <div class="hero-btns">
                  <a href="watch.html?type=${type}&id=${id}" class="btn btn-primary">▶ Watch Now</a>
                  <a href="movie.html?type=${type}&id=${id}" class="btn btn-outline">ℹ More Info</a>
                </div>
              </div>
            </div>`;
            }).join('');
            heroDots.innerHTML = heroSlides.map((_, i) => `<span data-index="${i}" class="${i===0?'active':''}"></span>`)
                .join('');
            document.querySelectorAll('.hero-dots span').forEach(dot => {
                dot.addEventListener('click', () => {
                    const idx = parseInt(dot.dataset.index);
                    showHeroSlide(idx);
                    resetHeroAutoplay();
                });
            });
            document.getElementById('heroPrev').addEventListener('click', () => {
                heroIndex = (heroIndex - 1 + heroSlides.length) % heroSlides.length;
                showHeroSlide(heroIndex);
                resetHeroAutoplay();
            });
            document.getElementById('heroNext').addEventListener('click', () => {
                heroIndex = (heroIndex + 1) % heroSlides.length;
                showHeroSlide(heroIndex);
                resetHeroAutoplay();
            });
        }

        function showHeroSlide(idx) {
            heroIndex = idx;
            document.querySelectorAll('.hero-slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.hero-dots span').forEach(d => d.classList.remove('active'));
            const slide = document.querySelector(`.hero-slide[data-index="${idx}"]`);
            const dot = document.querySelector(`.hero-dots span[data-index="${idx}"]`);
            if (slide) slide.classList.add('active');
            if (dot) dot.classList.add('active');
        }

        function startHeroAutoplay() {
            heroInterval = setInterval(() => {
                heroIndex = (heroIndex + 1) % heroSlides.length;
                showHeroSlide(heroIndex);
            }, 5000);
        }

        function resetHeroAutoplay() {
            clearInterval(heroInterval);
            startHeroAutoplay();
        }

        // ============ CONTENT SECTIONS ============
        const sectionConfigs = [
            { key: 'trending-movies', title: '🔥 Trending Movies', endpoint: '/trending/movie/week', type: 'movie' },
            { key: 'popular-movies', title: '🎬 Popular Movies', endpoint: '/movie/popular', type: 'movie' },
            { key: 'toprated-movies', title: '⭐ Top Rated Movies', endpoint: '/movie/top_rated', type: 'movie' },
            { key: 'upcoming-movies', title: '📅 Upcoming Movies', endpoint: '/movie/upcoming', type: 'movie' },
            { key: 'nowplaying-movies', title: '🎥 Now Playing', endpoint: '/movie/now_playing', type: 'movie' },
            { key: 'trending-tv', title: '📺 Trending TV Shows', endpoint: '/trending/tv/week', type: 'tv' },
            { key: 'popular-tv', title: '🌟 Popular TV Shows', endpoint: '/tv/popular', type: 'tv' },
            { key: 'toprated-tv', title: '🏆 Top Rated TV', endpoint: '/tv/top_rated', type: 'tv' },
            { key: 'airing-today', title: '📡 Airing Today', endpoint: '/tv/airing_today', type: 'tv' },
            { key: 'on-the-air', title: '🖥 On The Air', endpoint: '/tv/on_the_air', type: 'tv' },
        ];

        function createSectionHTML(config) {
            return `<div class="section" id="${config.key}">
            <div class="section-header">
              <h2>${config.title}</h2>
              <a href="trending.html?cat=${config.key}">View All →</a>
            </div>
            <div class="scroll-row" id="${config.key}-row">
              ${Array(8).fill('<div class="skeleton-card skeleton"></div>').join('')}
            </div>
          </div>`;
        }

        function renderCard(item, type) {
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const rating = (item.vote_average || 0).toFixed(1);
            const poster = imgUrl(item.poster_path, 'w342');
            const id = item.id;
            return `<div class="card" onclick="window.location.href='movie.html?type=${type}&id=${id}'" title="${title}">
            <img src="${poster}" alt="${title}" loading="lazy">
            <div class="card-badge">${type==='tv'?'TV':'HD'}</div>
            <div class="card-rating">⭐ ${rating}</div>
            <div class="card-info"><h3>${title}</h3><span>${year||'N/A'}</span></div>
          </div>`;
        }

        async function loadSection(config) {
            const row = document.getElementById(`${config.key}-row`);
            if (!row) return;
            try {
                const data = await fetchTMDB(config.endpoint);
                const items = (data.results || []).slice(0, 18);
                row.innerHTML = items.map(item => renderCard(item, config.type)).join('');
            } catch (e) {
                console.error(`Error loading ${config.key}:`, e);
                row.innerHTML =
                    '<div style="padding:20px;color:var(--text3);">Failed to load. Please try again later.</div>';
            }
        }

        function buildAllSections() {
            const main = document.getElementById('mainContent');
            main.innerHTML = sectionConfigs.map(c => createSectionHTML(c)).join('');
            sectionConfigs.forEach(c => loadSection(c));
        }

        // ============ BACK TO TOP ============
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 500);
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });
        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // ============ INIT ============
        function init() {
            loadHero();
            buildAllSections();
        }
        init();

        // Pause hero on hover
        heroContainer.addEventListener('mouseenter', () => clearInterval(heroInterval));
        heroContainer.addEventListener('mouseleave', startHeroAutoplay);

        console.log('%c🚀 StreamVault Premium %cLoaded Successfully',
            'color:#a855f7;font-size:1.4rem;font-weight:bold;', 'color:#e5e5e5;');
        console.log('%cAll data from TMDB API • Built with Vanilla HTML/CSS/JS', 'color:#777;');
    </script>
</body>
</html>
