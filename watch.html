<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamVault - Watch</title>

<style>
*,*::before,*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#050505;
    --surface:#0a0a0a;
    --primary:#7c3aed;
    --accent:#3b82f6;
    --text:#ffffff;
    --text-muted:#94a3b8;
    --border:rgba(255,255,255,0.08);
    --radius:16px;
    --radius-sm:8px;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,sans-serif;
    overflow-x:hidden;
}

.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid var(--border);
    background:#000;
}

.logo{
    font-size:1.5rem;
    font-weight:800;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.player-section{
    padding:20px;
}

.player-wrapper{
    width:100%;
    border-radius:16px;
    overflow:hidden;
    background:#000;
    border:1px solid var(--border);
    position:relative;
}

.player-wrapper.theater{
    position:fixed;
    inset:0;
    z-index:9999;
    border-radius:0;
}

.player-wrapper.theater iframe{
    height:100vh;
}

.player-iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    background:#000;
}

.player-controls{
    display:flex;
    gap:10px;
    padding:15px;
    background:#0b0b0b;
    border:1px solid var(--border);
    border-top:none;
    border-radius:0 0 16px 16px;
}

.server-btn{
    padding:10px 18px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:#151515;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
}

.server-btn:hover{
    border-color:var(--primary);
    background:rgba(124,58,237,0.2);
}

.server-btn.active{
    background:linear-gradient(135deg,var(--primary),var(--accent));
    border-color:transparent;
    color:#fff;
    box-shadow:
        0 0 10px rgba(124,58,237,.7),
        0 0 25px rgba(124,58,237,.5),
        0 0 40px rgba(59,130,246,.4);
    transform:translateY(-2px);
}

.ctrl-btn{
    padding:10px 16px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:#151515;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
    margin-left:auto;
}

.ctrl-btn:hover{
    background:rgba(124,58,237,0.2);
}

.info{
    padding:30px;
}

.title{
    font-size:2rem;
    font-weight:800;
    margin-bottom:10px;
}

.desc{
    color:var(--text-muted);
    max-width:900px;
    line-height:1.7;
}

.loader{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    z-index:5;
    transition:0.3s;
}

.loader.hidden{
    opacity:0;
    pointer-events:none;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid rgba(255,255,255,0.1);
    border-top-color:var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">StreamVault</div>

    <button class="ctrl-btn" onclick="toggleTheater()">
        Theater Mode
    </button>
</header>

<section class="player-section">

    <div class="player-wrapper" id="playerWrapper">

        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>

        <!-- FIXED IFRAME -->
        <iframe
            class="player-iframe"
            id="playerFrame"
            allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        ></iframe>

    </div>

    <div class="player-controls">

        <!-- FIXED BUTTON IDS -->
        <button class="server-btn active"
            id="srvVidStorm"
            onclick="switchServer('vidstorm')">
            VIDSTORM
        </button>

        <button class="server-btn"
            id="srvVidRock"
            onclick="switchServer('vidrock')">
            VIDROCK
        </button>

    </div>

</section>

<div class="info">
    <div class="title">
        Demon Slayer: Kimetsu no Yaiba Infinity Castle
    </div>

    <div class="desc">
        The Demon Slayer Corps are drawn into the Infinity Castle,
        where Tanjiro and the Hashira face terrifying Upper Rank
        demons in the final battle against Muzan Kibutsuji.
    </div>
</div>

<script>

const mediaId = 1311031;
const mediaType = "movie";

let currentServer = "vidstorm";

function getEmbedUrl() {

    if (mediaType === "movie") {

        if (currentServer === "vidrock") {
            return `https://vidrock.ru/movie/${mediaId}`;
        }

        return `https://vidstorm.ru/movie/${mediaId}`;
    }
}

function loadPlayer() {

    const loader = document.getElementById("loader");
    const frame = document.getElementById("playerFrame");

    loader.classList.remove("hidden");

    frame.src = "about:blank";

    setTimeout(() => {

        frame.src = getEmbedUrl();

        frame.onload = () => {
            loader.classList.add("hidden");
        };

        setTimeout(() => {
            loader.classList.add("hidden");
        }, 4000);

    }, 100);
}

/* FIXED SERVER BUTTONS */
function switchServer(server) {

    currentServer = server;

    document.querySelectorAll(".server-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    if (server === "vidstorm") {
        document.getElementById("srvVidStorm")
            .classList.add("active");
    }

    if (server === "vidrock") {
        document.getElementById("srvVidRock")
            .classList.add("active");
    }

    loadPlayer();
}

/* THEATER MODE */
function toggleTheater() {

    document.getElementById("playerWrapper")
        .classList.toggle("theater");
}

/* KEYBOARD SHORTCUTS */
document.addEventListener("keydown", e => {

    switch(e.key.toLowerCase()) {

        case "f":
            document.getElementById("playerFrame")
                .requestFullscreen();
            break;

        case "t":
            toggleTheater();
            break;

        case "1":
            switchServer("vidstorm");
            break;

        case "2":
            switchServer("vidrock");
            break;

        case "escape":
            document.getElementById("playerWrapper")
                .classList.remove("theater");
            break;
    }
});

/* LOAD PLAYER */
loadPlayer();

</script>

</body>
</html>
