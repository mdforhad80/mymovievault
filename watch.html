<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - CineStream</title>
    <style>
        :root {
            --bg:#0a0a0a; --bg2:#111; --glass:rgba(20,20,20,0.75); --border:rgba(255,255,255,0.06);
            --text:#e0e0e0; --text2:#aaa; --accent:#8b5cf6; --accent2:#a78bfa; --radius:14px;
            --transition:0.3s; --header-h:64px;
        }
        *{box-sizing:border-box; margin:0; padding:0;}
        body{background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh;}
        a{color:inherit; text-decoration:none;}
        button{cursor:pointer; border:none; outline:none; font-family:inherit;}
        .header{position:sticky; top:0; z-index:100; background:rgba(10,10,10,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); height:var(--header-h); display:flex; align-items:center; padding:0 20px; gap:12px;}
        .logo{font-size:1.4rem; font-weight:800; background:linear-gradient(135deg,#fff,var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto;}
        .btn{padding:8px 16px; border-radius:20px; background:var(--glass); border:1px solid var(--border); color:#fff; font-size:0.85rem; transition:var(--transition);}
        .btn.active{background:var(--accent); border-color:var(--accent);}
        .watch-container{display:flex; flex-wrap:wrap; gap:20px; padding:20px 3%; max-width:1400px; margin:0 auto;}
        .player-wrapper{flex:1 1 75%; min-width:300px; aspect-ratio:16/9; background:#000; border-radius:var(--radius); overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.5);}
        .player-wrapper iframe{width:100%; height:100%; border:none;}
        .watch-sidebar{flex:1 1 22%; min-width:260px; background:var(--bg2); border-radius:var(--radius); padding:16px; border:1px solid var(--border);}
        .server-selector{display:flex; gap:8px; margin:10px 0;}
        .episode-grid{display:flex; flex-wrap:wrap; gap:6px; max-height:200px; overflow-y:auto;}
        .episode-btn{width:40px; height:36px; border-radius:6px; background:var(--glass); border:1px solid var(--border); color:#fff; font-size:0.8rem;}
        .episode-btn.active{background:var(--accent);}
        .section-title{font-weight:700; margin:12px 0 6px;}
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">CineStream</a>
        <a href="javascript:history.back()" class="btn">← Back</a>
    </header>

    <div id="watchApp">
        <div class="player-wrapper skeleton" style="aspect-ratio:16/9;"></div>
    </div>

    <script>
        (function() {
            const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
            const TMDB_BASE = "https://api.themoviedb.org/3";
            const VIDSTORM_MOVIE = "https://vidstorm.ru/movie/";
            const VIDROCK_MOVIE = "https://vidrock.ru/movie/";
            const VIDSTORM_TV = "https://vidstorm.ru/tv/";
            const VIDROCK_TV = "https://vidrock.ru/tv/";

            async function fetchTMDB(endpoint, params = {}) {
                const url = new URL(`${TMDB_BASE}${endpoint}`);
                url.searchParams.set('api_key', TMDB_API_KEY);
                Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
                const res = await fetch(url);
                return res.ok ? res.json() : null;
            }

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const type = params.get('type') || 'movie';
            let season = parseInt(params.get('season')) || 1;
            let episode = parseInt(params.get('episode')) || 1;
            let currentServer = 'vidstorm';

            const app = document.getElementById('watchApp');

            function getEmbedUrl() {
                if(type==='movie') {
                    return currentServer==='vidstorm' ? `${VIDSTORM_MOVIE}${id}` : `${VIDROCK_MOVIE}${id}`;
                } else {
                    return currentServer==='vidstorm' ? `${VIDSTORM_TV}${id}/${season}/${episode}` : `${VIDROCK_TV}${id}/${season}/${episode}`;
                }
            }

            function renderPlayer() {
                const embed = getEmbedUrl();
                return `
                <div class="player-wrapper">
                    <iframe src="${embed}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                </div>
                <div class="player-controls">
                    <span>Server:</span>
                    <button class="btn server-btn ${currentServer==='vidstorm'?'active':''}" onclick="switchServer('vidstorm')">VidStorm</button>
                    <button class="btn server-btn ${currentServer==='vidrock'?'active':''}" onclick="switchServer('vidrock')">VidRock</button>
                    <button class="btn" onclick="toggleTheater()">🎭 Theater</button>
                    <button class="btn" onclick="document.querySelector('.player-wrapper iframe')?.requestFullscreen()">⛶ Fullscreen</button>
                </div>`;
            }

            async function loadWatch() {
                if(!id) { app.innerHTML='<p>Missing content ID.</p>'; return; }
                const data = await fetchTMDB(`/${type}/${id}`);
                if(!data) { app.innerHTML='<p>Failed to load.</p>'; return; }
                const title = data.title || data.name;
                document.title = `Watching: ${title}`;

                let sidebarHTML = `<h3>${title}</h3>`;
                if(type==='tv') {
                    const seasons = data.number_of_seasons || 1;
                    sidebarHTML += `<div><label>Season: </label><select id="seasonSelect" onchange="changeSeason(this.value)">`;
                    for(let s=1; s<=seasons; s++) sidebarHTML += `<option value="${s}" ${s===season?'selected':''}>Season ${s}</option>`;
                    sidebarHTML += `</select></div>`;
                    sidebarHTML += `<div class="section-title">Episodes</div><div class="episode-grid" id="episodeGrid">Loading...</div>`;
                }
                sidebarHTML += `<div class="section-title">Keyboard: ← → prev/next episode</div>`;

                app.innerHTML = renderPlayer() + `<div class="watch-container"><div class="watch-sidebar">${sidebarHTML}</div></div>`;

                if(type==='tv') {
                    loadEpisodes();
                }

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if(e.key==='ArrowRight') nextEpisode();
                    if(e.key==='ArrowLeft') prevEpisode();
                });
            }

            async function loadEpisodes() {
                const seasonData = await fetchTMDB(`/tv/${id}/season/${season}`);
                const episodes = seasonData?.episodes || [];
                const grid = document.getElementById('episodeGrid');
                if(grid) {
                    grid.innerHTML = episodes.map(ep=>`
                        <button class="episode-btn ${ep.episode_number===episode?'active':''}" 
                                onclick="changeEpisode(${ep.episode_number})">${ep.episode_number}</button>
                    `).join('');
                }
            }

            window.switchServer = function(server) {
                currentServer = server;
                const playerDiv = document.querySelector('.player-wrapper');
                if(playerDiv) playerDiv.outerHTML = renderPlayer().match(/<div class="player-wrapper">.*?<\/div>/s)[0];
                document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
                document.querySelector(`.server-btn.${server}`)?.classList.add('active');
            };
            window.changeSeason = function(s) {
                season = parseInt(s);
                episode = 1;
                loadWatch();
            };
            window.changeEpisode = function(ep) {
                episode = ep;
                const playerDiv = document.querySelector('.player-wrapper');
                if(playerDiv) playerDiv.outerHTML = renderPlayer().match(/<div class="player-wrapper">.*?<\/div>/s)[0];
                document.querySelectorAll('.episode-btn').forEach(b=>b.classList.remove('active'));
                document.querySelector(`.episode-btn:nth-child(${ep})`)?.classList.add('active');
            };
            window.nextEpisode = function() {
                if(type!=='tv') return;
                changeEpisode(episode+1);
            };
            window.prevEpisode = function() {
                if(type!=='tv' || episode<=1) return;
                changeEpisode(episode-1);
            };
            window.toggleTheater = function() {
                document.querySelector('.watch-container')?.classList.toggle('theater-mode');
            };

            loadWatch();
        })();
    </script>
</body>
</html>
