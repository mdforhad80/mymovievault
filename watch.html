<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineStream – Watch</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="navbar">
    <button class="menu-btn">☰</button>
    <div class="navbar-center"><span class="neon-text">Cine</span>Stream</div>
    <button class="search-btn">🔍</button>
  </header>

  <main class="watch-page">
    <div class="player-container">
      <iframe id="video-iframe" allowfullscreen allow="autoplay; fullscreen" frameborder="0"></iframe>
    </div>
    <div class="watch-controls">
      <select id="server-select" class="server-select"></select>
      <button id="next-episode-btn" class="btn small" style="display:none;">Next Episode →</button>
    </div>
    <div id="movie-info"></div>
  </main>

  <div class="search-overlay" id="searchOverlay">...</div>
  <nav class="mobile-nav">...</nav>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/player.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
