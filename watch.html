<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch – KaiCrush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">…</header>
        <nav class="sidebar">…</nav>
        <main class="main-content" id="mainContent">
            <div id="watchContainer" class="watch-container">
                <div class="player-wrapper">
                    <iframe id="playerFrame" src="" allowfullscreen></iframe>
                </div>
                <div class="watch-info">
                    <h1 id="watchTitle"></h1>
                    <div class="episode-controls">
                        <button id="prevEp">‹ Prev</button>
                        <span id="epDisplay">Episode 1</span>
                        <button id="nextEp">Next ›</button>
                    </div>
                    <div class="server-tabs">
                        <button class="server-btn active" data-type="sub">Sub</button>
                        <button class="server-btn" data-type="dub">Dub</button>
                    </div>
                    <div class="episode-list" id="episodeList"></div>
                </div>
            </div>
        </main>
        <footer class="footer">…</footer>
    </div>
    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const malId = params.get('id');
        const ep = parseInt(params.get('ep')) || 1;
        const type = params.get('type') || 'sub';
        if (malId) loadWatchPage(malId, ep, type);
    </script>
</body>
</html>
