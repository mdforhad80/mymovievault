<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault - Watch</title>
    <meta name="description" content="Watch movies and TV shows in HD quality">

    <link rel="preconnect" href="https://api.themoviedb.org">
    <link rel="preconnect" href="https://image.tmdb.org">

    <style>
        *,*::before,*::after{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg:#050505;
            --surface:#0a0a0a;
            --surface-glass:rgba(15,15,20,0.85);

            --primary:#7c3aed;
            --primary-glow:rgba(124,58,237,0.4);

            --accent:#3b82f6;
            --accent-glow:rgba(59,130,246,0.3);

            --text:#f8fafc;
            --text-muted:#94a3b8;

            --border:rgba(255,255,255,0.08);

            --radius:16px;
            --radius-sm:8px;

            --shadow:0 8px 32px rgba(0,0,0,0.6);
            --shadow-glow:0 0 40px var(--primary-glow);

            --transition:all .35s cubic-bezier(.4,0,.2,1);
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            line-height:1.6;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }

        a{
            color:inherit;
            text-decoration:none;
        }

        img{
            max-width:100%;
            display:block;
        }

        button{
            border:none;
            background:none;
            cursor:pointer;
            font-family:inherit;
            color:inherit;
        }

        ul{
            list-style:none;
        }

        ::-webkit-scrollbar{
            width:6px;
            height:6px;
        }

        ::-webkit-scrollbar-thumb{
            background:var(--primary);
            border-radius:3px;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        /* HEADER */

        .header{
            position:fixed;
            top:0;
            left:0;
            right:0;
            z-index:1000;

            background:rgba(5,5,5,0.95);
            backdrop-filter:blur(20px);

            padding:0 4%;
            height:60px;

            display:flex;
            align-items:center;
            justify-content:space-between;

            border-bottom:1px solid var(--border);
        }

        .header-left,
        .header-right{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .logo{
            font-size:1.4rem;
            font-weight:800;
            letter-spacing:-1px;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--accent)
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .back-btn{
            width:36px;
            height:36px;

            border-radius:50%;

            background:rgba(255,255,255,0.05);

            border:1px solid var(--border);

            display:flex;
            align-items:center;
            justify-content:center;

            transition:var(--transition);
        }

        .back-btn:hover{
            background:rgba(124,58,237,0.2);
            border-color:var(--primary);
        }

        .back-btn svg{
            width:18px;
            height:18px;

            stroke:var(--text);
            fill:none;
            stroke-width:2;
        }

        .header-title{
            font-size:1rem;
            font-weight:600;

            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;

            max-width:400px;
        }

        /* PLAYER */

        .player-section{
            padding:80px 4% 20px;
            max-width:1600px;
            margin:0 auto;
        }

        .player-wrapper{
            position:relative;
            width:100%;

            background:var(--surface);

            border-radius:var(--radius);

            overflow:hidden;

            border:1px solid var(--border);

            box-shadow:var(--shadow);

            transition:var(--transition);
        }

        .player-wrapper.theater{
            position:fixed;
            inset:0;

            z-index:9999;

            border-radius:0;
            border:none;
            max-width:none;
        }

        .player-wrapper.theater .player-iframe{
            height:100vh;
        }

        .player-iframe{
            width:100%;
            aspect-ratio:16/9;

            border:none;
            display:block;

            background:#000;
        }

        .player-loader{
            position:absolute;
            inset:0;

            background:var(--surface);

            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;

            z-index:10;

            transition:opacity .3s;
        }

        .player-loader.hidden{
            opacity:0;
            pointer-events:none;
        }

        .loader-ring{
            width:48px;
            height:48px;

            border:3px solid rgba(124,58,237,.2);
            border-top-color:var(--primary);

            border-radius:50%;

            animation:spin 1s linear infinite;
        }

        .player-loader p{
            margin-top:12px;
            font-size:.85rem;
            color:var(--text-muted);
        }

        /* CONTROLS */

        .player-controls{
            display:flex;
            align-items:center;
            gap:12px;

            padding:12px 16px;

            background:var(--surface-glass);

            border-top:1px solid var(--border);

            backdrop-filter:blur(20px);
        }

        .server-group{
            display:flex;
            gap:8px;
        }

        .server-btn{
            padding:8px 16px;

            border-radius:var(--radius-sm);

            font-size:.8rem;
            font-weight:700;

            text-transform:uppercase;
            letter-spacing:1px;

            transition:var(--transition);

            border:1px solid var(--border);

            background:rgba(255,255,255,.05);
        }

        .server-btn:hover{
            background:rgba(124,58,237,.2);
            border-color:var(--primary);
        }

        .server-btn.active{
            background:linear-gradient(
                135deg,
                var(--primary),
                var(--accent)
            );

            border-color:transparent;

            color:#fff;

            box-shadow:
                0 0 10px rgba(124,58,237,.7),
                0 0 25px rgba(124,58,237,.5),
                0 0 40px rgba(59,130,246,.4);

            transform:translateY(-2px);
        }

        .ctrl-btn{
            padding:8px 16px;

            background:rgba(255,255,255,0.05);

            border:1px solid var(--border);

            border-radius:var(--radius-sm);

            font-size:.85rem;
            font-weight:600;

            display:flex;
            align-items:center;
            gap:6px;

            transition:var(--transition);
        }

        .ctrl-btn:hover{
            background:rgba(124,58,237,.2);
            border-color:var(--primary);
        }

        .ctrl-btn svg{
            width:16px;
            height:16px;

            stroke:currentColor;
            fill:none;
            stroke-width:2;
        }

        /* INFO */

        .watch-info{
            padding:30px 4%;
            max-width:1400px;
            margin:0 auto;

            display:grid;
            grid-template-columns:1fr 320px;
            gap:30px;
        }

        .info-title{
            font-size:1.8rem;
            font-weight:800;
            margin-bottom:12px;
        }

        .info-meta{
            display:flex;
            align-items:center;
            gap:16px;

            margin-bottom:16px;

            font-size:.9rem;
            color:var(--text-muted);

            flex-wrap:wrap;
        }

        .info-rating{
            display:flex;
            align-items:center;
            gap:4px;

            color:#fbbf24;
            font-weight:700;
        }

        .info-overview{
            font-size:1rem;
            color:var(--text-muted);
            line-height:1.7;
            margin-bottom:24px;
        }

        .info-genres{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-bottom:24px;
        }

        .info-genre{
            padding:6px 14px;

            background:rgba(124,58,237,.15);

            border:1px solid rgba(124,58,237,.3);

            border-radius:20px;

            font-size:.8rem;

            color:var(--primary);
        }

        /* CAST */

        .cast-sidebar-title{
            font-size:1.1rem;
            font-weight:700;
            margin-bottom:16px;
        }

        .cast-item{
            display:flex;
            align-items:center;
            gap:12px;

            padding:10px;

            border-radius:var(--radius-sm);

            transition:var(--transition);
        }

        .cast-item:hover{
            background:rgba(124,58,237,.1);
        }

        .cast-item img{
            width:48px;
            height:48px;

            border-radius:50%;
            object-fit:cover;

            border:2px solid var(--border);
        }

        .cast-item-name{
            font-size:.9rem;
            font-weight:600;
        }

        .cast-item-role{
            font-size:.75rem;
            color:var(--text-muted);
        }

        /* FOOTER */

        .footer{
            padding:30px 4%;
            text-align:center;

            border-top:1px solid var(--border);

            margin-top:40px;
        }

        .footer-copy{
            font-size:.75rem;
            color:rgba(148,163,184,.5);
        }

        @media(max-width:768px){

            .watch-info{
                grid-template-columns:1fr;
            }

            .header-title{
                max-width:200px;
                font-size:.85rem;
            }
        }
    </style>

    <base target="_blank">
</head>

<body>

<header class="header">

    <div class="header-left">

        <button class="back-btn" onclick="window.history.back()">

            <svg viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>

        </button>

        <a href="index.html" class="logo">
            StreamVault
        </a>

        <span class="header-title" id="headerTitle">
            Loading...
        </span>

    </div>

    <div class="header-right">

        <button
            class="ctrl-btn"
            onclick="toggleTheater()"
            id="theaterBtn">

            <svg viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>

            Theater

        </button>

    </div>

</header>

<section class="player-section">

    <div class="player-wrapper" id="playerWrapper">

        <div class="player-loader" id="playerLoader">

            <div class="loader-ring"></div>

            <p>Loading player...</p>

        </div>

        <!-- FIXED IFRAME -->
        <iframe
            class="player-iframe"
            id="playerFrame"
            src=""
            allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture">
        </iframe>

    </div>

    <div class="player-controls">

        <div class="server-group">

            <button
                class="server-btn active"
                id="srvVidStorm"
                onclick="switchServer('vidstorm')">

                VidStorm

            </button>

            <button
                class="server-btn"
                id="srvVidRock"
                onclick="switchServer('vidrock')">

                VidRock

            </button>

        </div>

    </div>

</section>

<div class="watch-info">

    <div class="watch-main">

        <h1 class="info-title" id="infoTitle">
            Loading...
        </h1>

        <div class="info-meta" id="infoMeta"></div>

        <div class="info-genres" id="infoGenres"></div>

        <p class="info-overview" id="infoOverview">
            Loading description...
        </p>

    </div>

    <div class="watch-sidebar">

        <div class="cast-sidebar-title">
            Top Cast
        </div>

        <div id="castList"></div>

    </div>

</div>

<footer class="footer">

    <div class="footer-copy">
        &copy; 2026 StreamVault. All rights reserved.
    </div>

</footer>

<script>

const TMDB_API_KEY = "YOUR_TMDB_API_KEY";

const TMDB_BASE = "https://api.themoviedb.org/3";

const IMG_BASE = "https://image.tmdb.org/t/p/";

const params = new URLSearchParams(window.location.search);

const mediaId = params.get('id');

const mediaType = params.get('type') || 'movie';

const isTV = mediaType === 'tv';

let currentServer = 'vidstorm';

/* IMAGE */

function img(path,size='w500'){

    return path
    ? `${IMG_BASE}${size}${path}`
    : '';
}

/* TMDB FETCH */

async function fetchTMDB(endpoint){

    const res = await fetch(
        `${TMDB_BASE}${endpoint}?api_key=${TMDB_API_KEY}`
    );

    return await res.json();
}

/* EMBED */

function getEmbedUrl(){

    if(isTV){

        return currentServer === 'vidrock'
            ? `https://vidrock.ru/tv/${mediaId}/1/1`
            : `https://vidstorm.ru/tv/${mediaId}/1/1`;
    }

    return currentServer === 'vidrock'
        ? `https://vidrock.ru/movie/${mediaId}`
        : `https://vidstorm.ru/movie/${mediaId}`;
}

/* LOAD PLAYER */

function loadPlayer(){

    const frame = document.getElementById('playerFrame');

    document
        .getElementById('playerLoader')
        .classList.remove('hidden');

    frame.src = 'about:blank';

    setTimeout(()=>{

        frame.src = getEmbedUrl();

        frame.onload = ()=>{

            document
                .getElementById('playerLoader')
                .classList.add('hidden');
        };

    },100);
}

/* FIXED BUTTON LIGHTING */

function switchServer(server){

    currentServer = server;

    document
        .querySelectorAll('.server-btn')
        .forEach(btn=>btn.classList.remove('active'));

    if(server === 'vidstorm'){

        document
            .getElementById('srvVidStorm')
            .classList.add('active');
    }

    if(server === 'vidrock'){

        document
            .getElementById('srvVidRock')
            .classList.add('active');
    }

    loadPlayer();
}

/* THEATER */

function toggleTheater(){

    document
        .getElementById('playerWrapper')
        .classList.toggle('theater');

    document
        .getElementById('theaterBtn')
        .classList.toggle('active');
}

/* INIT */

async function initWatch(){

    if(!mediaId) return;

    const endpoint = isTV
        ? `/tv/${mediaId}`
        : `/movie/${mediaId}`;

    const details = await fetchTMDB(endpoint);

    const credits = await fetchTMDB(
        `${endpoint}/credits`
    );

    document.getElementById('headerTitle')
        .textContent =
        details.title || details.name;

    document.getElementById('infoTitle')
        .textContent =
        details.title || details.name;

    const date = isTV
        ? details.first_air_date
        : details.release_date;

    const runtime = isTV
        ? `${details.number_of_seasons} Seasons`
        : `${details.runtime} min`;

    document.getElementById('infoMeta').innerHTML = `
        <span class="info-rating">
            ⭐ ${(details.vote_average || 0).toFixed(1)}
        </span>

        <span>
            ${date ? date.slice(0,4) : 'N/A'}
        </span>

        <span>${runtime}</span>

        <span>${details.status || 'N/A'}</span>
    `;

    document.getElementById('infoGenres').innerHTML =
        (details.genres || [])
        .map(g=>`
            <span class="info-genre">
                ${g.name}
            </span>
        `).join('');

    document.getElementById('infoOverview')
        .textContent =
        details.overview || 'No description available';

    document.getElementById('castList').innerHTML =
        (credits.cast || [])
        .slice(0,8)
        .map(person=>`
            <div class="cast-item">

                <img
                    src="${img(person.profile_path,'w185')}"
                    alt="${person.name}"
                >

                <div>

                    <div class="cast-item-name">
                        ${person.name}
                    </div>

                    <div class="cast-item-role">
                        ${person.character}
                    </div>

                </div>

            </div>
        `).join('');

    loadPlayer();
}

document.addEventListener(
    'DOMContentLoaded',
    initWatch
);

/* SHORTCUTS */

document.addEventListener('keydown',e=>{

    switch(e.key.toLowerCase()){

        case 'f':

            document
                .getElementById('playerFrame')
                .requestFullscreen();

            break;

        case 't':

            toggleTheater();

            break;

        case '1':

            switchServer('vidstorm');

            break;

        case '2':

            switchServer('vidrock');

            break;

        case 'escape':

            document
                .getElementById('playerWrapper')
                .classList.remove('theater');

            break;
    }
});

</script>

</body>
</html>
