<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineStream — Watch</title>
  <style>
    /* Full CSS here (same as movie.html) plus player-specific: */
    .player-container { padding: 20px 40px; max-width: 1200px; margin: 0 auto; }
    .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-glow); }
    .player-wrapper iframe { width: 100%; height: 100%; border: none; }
    .player-wrapper.theater-mode { aspect-ratio: 21/9; min-height: 70vh; }
    .player-controls { display: flex; align-items: center; gap: 10px; padding: 12px 16px; flex-wrap: wrap; background: var(--bg-secondary); border-radius: var(--radius-sm); margin-top: 12px; border: 1px solid var(--border); }
    .server-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text); cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: var(--transition); }
    .server-btn.active, .server-btn:hover { background: var(--purple); border-color: var(--purple); color: #fff; box-shadow: 0 0 15px var(--purple-glow); }
    .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 6px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
    .episode-btn { padding: 8px 4px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text); cursor: pointer; font-size: 0.75rem; text-align: center; transition: var(--transition); }
    .episode-btn.active, .episode-btn:hover { background: var(--purple); border-color: var(--purple); color: #fff; }
    .season-select { padding: 10px 14px; border-radius: var(--radius-sm); background: var(--bg-tertiary); color: var(--text); border: 1px solid var(--border); font-size: 0.9rem; cursor: pointer; min-width: 150px; }
  </style>
</head>
<body>
  <!-- … same particles, overlays, navbar … -->
  <main class="main-content">
    <div class="player-container">
      <div class="player-wrapper" id="playerWrapper">
        <iframe id="videoPlayer" allowfullscreen loading="lazy"></iframe>
      </div>
      <div class="player-controls" id="playerControls"></div>
    </div>
  </main>
  <script type="module">
    const API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
    const BASE_URL = "https://api.themoviedb.org/3";
    // … other constants …
    function generateMovieEmbed(tmdbId, server) { /* as in index */ }
    function generateTVEmbed(tmdbId, season, episode, server) { /* as in index */ }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const type = params.get('type');
      let season = parseInt(params.get('season')) || 1;
      let episode = parseInt(params.get('episode')) || 1;
      const server = params.get('server') || 'vidplus';

      if (!id || !type) { /* error handling */ }

      const playerIframe = document.getElementById('videoPlayer');
      const playerWrapper = document.getElementById('playerWrapper');
      const controlsDiv = document.getElementById('playerControls');

      function loadPlayer() {
        if (type === 'movie') {
          playerIframe.src = generateMovieEmbed(id, server);
        } else {
          playerIframe.src = generateTVEmbed(id, season, episode, server);
        }
      }

      const servers = ['vidplus', 'vidstorm', 'vidrock'];
      let serverHTML = servers.map(s => `<button class="server-btn ${s===server?'active':''}" data-server="${s}">${s}</button>`).join('');

      if (type === 'tv') {
        try {
          const tv = await tmdbFetch(`/tv/${id}`);
          const seasons = tv.seasons?.filter(s => s.season_number > 0) || [];
          controlsDiv.innerHTML = `
            <select class="season-select" id="seasonSelect">${seasons.map(s => `<option value="${s.season_number}" ${s.season_number===season?'selected':''}>Season ${s.season_number}</option>`).join('')}</select>
            <div style="display:flex; gap:10px; align-items:center;">
              <label style="color:var(--muted);">Episode:</label>
              <div class="episode-grid" id="episodeGrid"></div>
            </div>
            <div style="margin-left:auto; display:flex; gap:8px;">${serverHTML}</div>
          `;
          async function loadEpisodes(seasonNum) {
            const epGrid = document.getElementById('episodeGrid');
            epGrid.innerHTML = '<span style="color:var(--muted);">Loading...</span>';
            const seasonData = await tmdbFetch(`/tv/${id}/season/${seasonNum}`);
            const episodes = seasonData.episodes || [];
            epGrid.innerHTML = episodes.map(ep => `<button class="episode-btn ${ep.episode_number===episode?'active':''}" data-episode="${ep.episode_number}">${ep.episode_number}</button>`).join('');
            epGrid.querySelectorAll('.episode-btn').forEach(btn => {
              btn.addEventListener('click', () => {
                episode = parseInt(btn.dataset.episode);
                loadPlayer();
                epGrid.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
              });
            });
          }
          loadEpisodes(season);
          document.getElementById('seasonSelect').addEventListener('change', (e) => {
            season = parseInt(e.target.value);
            episode = 1;
            loadPlayer();
            loadEpisodes(season);
          });
        } catch (e) { /* fallback */ }
      } else {
        controlsDiv.innerHTML = `<div style="flex:1;"></div><div style="display:flex; gap:8px;">${serverHTML}</div>`;
      }

      controlsDiv.addEventListener('click', (e) => {
        if (e.target.classList.contains('server-btn')) {
          const newServer = e.target.dataset.server;
          controlsDiv.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          if (type === 'movie') playerIframe.src = generateMovieEmbed(id, newServer);
          else playerIframe.src = generateTVEmbed(id, season, episode, newServer);
        }
      });

      loadPlayer();

      // Keyboard shortcuts for theater mode and fullscreen
      document.addEventListener('keydown', (e) => {
        if (e.key === 't') playerWrapper.classList.toggle('theater-mode');
        else if (e.key === 'f') {
          if (playerIframe.requestFullscreen) playerIframe.requestFullscreen();
          else if (playerIframe.webkitRequestFullscreen) playerIframe.webkitRequestFullscreen();
        }
      });
    }
    // … common navbar, particles, search overlay scripts …
    init();
  </script>
</body>
</html>
