<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineStream – Search</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="navbar">...</header>
  <main>
    <div class="search-page-container">
      <input type="text" id="searchPageInput" placeholder="Search..." style="width:100%; padding:1rem; margin:1rem 0; background:var(--bg-secondary); border:none; border-radius:2rem; color:var(--text);">
      <div id="searchPageResults" class="grid"></div>
      <div id="loadMoreBtn" style="text-align:center; margin:1rem; display:none;">
        <button class="btn outline" onclick="loadMoreSearchResults()">Load More</button>
      </div>
    </div>
  </main>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    let currentPage = 1;
    let currentQuery = '';
    async function performSearch(page=1) {
      const q = document.getElementById('searchPageInput').value.trim();
      if (!q) return;
      currentQuery = q;
      const data = await searchMulti(q, page);
      const container = document.getElementById('searchPageResults');
      if (page === 1) container.innerHTML = '';
      container.innerHTML += data.results.map(r => createCard(r, r.media_type === 'tv' ? 'tv' : 'movie')).join('');
      document.getElementById('loadMoreBtn').style.display = data.page < data.total_pages ? 'block' : 'none';
      currentPage = page;
    }
    document.getElementById('searchPageInput').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') { currentPage=1; performSearch(1); }
    });
    function loadMoreSearchResults() { performSearch(currentPage+1); }
  </script>
</body>
</html>
