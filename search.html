<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - CineStream</title>
    <style>
        :root {
            --bg:#0a0a0a; --bg2:#111; --glass:rgba(20,20,20,0.75); --border:rgba(255,255,255,0.06);
            --text:#e0e0e0; --accent:#8b5cf6; --radius:14px; --transition:0.3s;
        }
        *{box-sizing:border-box; margin:0; padding:0;}
        body{background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif;}
        .header{position:sticky; top:0; background:rgba(10,10,10,0.9); backdrop-filter:blur(20px); padding:12px 5%; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border);}
        .logo{font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,#fff,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto;}
        .filter-bar{display:flex; gap:10px; flex-wrap:wrap; padding:16px 5%;}
        select,input{background:var(--glass); border:1px solid var(--border); color:#fff; padding:10px 14px; border-radius:20px; font-size:0.9rem; outline:none;}
        .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px; padding:0 5% 30px;}
        .card{border-radius:var(--radius); overflow:hidden; background:var(--bg2); transition:var(--transition); cursor:pointer; border:1px solid transparent;}
        .card:hover{transform:translateY(-6px); border-color:var(--accent);}
        .card img{width:100%; aspect-ratio:2/3; object-fit:cover;}
        .card .title{font-size:0.85rem; padding:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
        .load-more{text-align:center; padding:20px;}
        .btn{background:var(--accent); color:#fff; padding:12px 28px; border-radius:30px; border:none; font-weight:600; cursor:pointer;}
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">CineStream</a>
        <input type="text" id="searchQuery" placeholder="Search..." style="flex:1; max-width:300px;">
    </header>
    <div class="filter-bar">
        <select id="typeFilter"><option value="multi">All</option><option value="movie">Movies</option><option value="tv">TV</option></select>
        <select id="genreFilter"><option value="">All Genres</option></select>
        <input type="number" id="yearFilter" placeholder="Year" style="width:80px;">
        <select id="sortFilter"><option value="popularity.desc">Popularity</option><option value="vote_average.desc">Rating</option><option value="release_date.desc">Release Date</option></select>
    </div>
    <div class="grid" id="resultsGrid"></div>
    <div class="load-more" id="loadMoreBtn" style="display:none;"><button class="btn" onclick="loadMore()">Load More</button></div>

    <script>
        (function() {
            const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
            const TMDB_BASE = "https://api.themoviedb.org/3";
            const IMG = "https://image.tmdb.org/t/p/w342";
            let currentPage = 1;
            let totalPages = 1;

            async function fetchTMDB(endpoint, params) {
                const url = new URL(`${TMDB_BASE}${endpoint}`);
                url.searchParams.set('api_key', TMDB_API_KEY);
                Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
                const res = await fetch(url);
                return res.ok ? res.json() : null;
            }

            async function search(page=1) {
                const query = document.getElementById('searchQuery').value.trim();
                const type = document.getElementById('typeFilter').value;
                const genre = document.getElementById('genreFilter').value;
                const year = document.getElementById('yearFilter').value;
                const sort = document.getElementById('sortFilter').value;

                let endpoint = '/trending/all/week';
                let params = {page};
                if(query) {
                    endpoint = '/search/multi';
                    params.query = query;
                } else if(type==='movie') endpoint = '/discover/movie';
                else if(type==='tv') endpoint = '/discover/tv';
                else endpoint = '/trending/all/week';

                if(genre) params.with_genres = genre;
                if(year) params.year = year;
                if(sort) params.sort_by = sort;

                const data = await fetchTMDB(endpoint, params);
                if(!data) return;
                totalPages = data.total_pages;
                const results = data.results.filter(r=>r.poster_path);
                const grid = document.getElementById('resultsGrid');
                if(page===1) grid.innerHTML = '';
                results.forEach(item=>{
                    const title = item.title || item.name;
                    const type = item.media_type || (item.title?'movie':'tv');
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${IMG}${item.poster_path}" alt="${title}"><div class="title">${title}</div>`;
                    card.onclick = ()=> window.location = `movie.html?id=${item.id}&type=${type}`;
                    grid.appendChild(card);
                });
                document.getElementById('loadMoreBtn').style.display = page < totalPages ? 'block' : 'none';
            }

            window.loadMore = function() {
                currentPage++;
                search(currentPage);
            };

            document.getElementById('searchQuery').addEventListener('input', ()=>{
                currentPage=1; search(1);
            });
            document.getElementById('typeFilter').addEventListener('change', ()=>{currentPage=1; search(1);});
            document.getElementById('genreFilter').addEventListener('change', ()=>{currentPage=1; search(1);});
            document.getElementById('yearFilter').addEventListener('change', ()=>{currentPage=1; search(1);});
            document.getElementById('sortFilter').addEventListener('change', ()=>{currentPage=1; search(1);});

            // Load genres
            (async ()=>{
                const movieGenres = await fetchTMDB('/genre/movie/list',{});
                const tvGenres = await fetchTMDB('/genre/tv/list',{});
                const genres = [...(movieGenres?.genres||[]), ...(tvGenres?.genres||[])];
                const unique = [...new Map(genres.map(g=>[g.id,g])).values()];
                const sel = document.getElementById('genreFilter');
                unique.forEach(g=>{ const opt=document.createElement('option'); opt.value=g.id; opt.textContent=g.name; sel.appendChild(opt); });
            })();

            search(1);
        })();
    </script>
</body>
</html>
